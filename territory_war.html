<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TERRITORY WAR v1.442 · 4색 영토전</title>
<style>
  :root{
    --bg:#07080f;
    --panel:#0d1020;
    --grid:#1a1f3a;
    --t0:#ff3b6b; /* RED   */
    --t1:#2fd0ff; /* CYAN  */
    --t2:#ffd23b; /* GOLD  */
    --t3:#7c5cff; /* VIOLET*/
    --neutral:#3a4060;
    --ink:#e7ecff;
    --dim:#8b93b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #14182f 0%, var(--bg) 60%);
    color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100dvh;
    padding:env(safe-area-inset-top) 10px calc(env(safe-area-inset-bottom) + 8px);
    overflow:hidden;
    user-select:none;
  }
  header{
    width:100%;max-width:560px;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 4px 8px;
  }
  .title{
    font-weight:800;letter-spacing:3px;font-size:15px;
    background:linear-gradient(90deg,var(--t0),var(--t1),var(--t2),var(--t3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tick{font-size:11px;color:var(--dim);letter-spacing:1px;font-variant-numeric:tabular-nums;}

  /* score bars */
  .scoreboard{
    width:100%;max-width:560px;
    display:flex;gap:6px;margin-bottom:8px;
  }
  .sb{flex:1;background:var(--panel);border-radius:8px;padding:6px 8px;position:relative;overflow:hidden;}
  .sb .name{font-size:9px;letter-spacing:1px;color:var(--dim);font-weight:700;}
  .sb .val{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;}
  .sb .fill{position:absolute;left:0;bottom:0;height:3px;transition:width .4s ease;}

  .stage{
    width:100%;max-width:560px;
    aspect-ratio:1/1;
    background:var(--panel);
    border-radius:14px;
    border:1px solid #1c2240;
    box-shadow:0 0 40px rgba(60,80,200,.15), inset 0 0 60px rgba(0,0,0,.5);
    position:relative;overflow:hidden;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  .controls{
    width:100%;max-width:560px;
    display:flex;gap:8px;margin-top:10px;align-items:center;
  }
  button{
    flex:1;background:var(--panel);color:var(--ink);
    border:1px solid #232a4d;border-radius:10px;
    padding:11px 6px;font-size:13px;font-weight:700;letter-spacing:1px;
    cursor:pointer;transition:.15s;
  }
  button:active{transform:scale(.96);background:#161b34;}
  button.lit{border-color:var(--t1);color:var(--t1);box-shadow:0 0 14px rgba(47,208,255,.25);}
  .speed{flex:1.4;display:flex;gap:4px;}
  .speed button{flex:1;font-size:12px;padding:11px 2px;}

  .cheer{
    width:100%;max-width:560px;margin-top:8px;
    display:flex;flex-direction:column;align-items:center;gap:5px;
  }
  .cheer-label{font-size:9px;letter-spacing:2px;color:var(--dim);font-weight:700;text-transform:uppercase;}
  .cheer-row{display:flex;gap:8px;width:100%;}
  .cheer-btn{
    flex:1;border:none;border-radius:10px;
    padding:13px 4px;font-size:12px;font-weight:800;letter-spacing:1px;
    color:#06070d;cursor:pointer;position:relative;overflow:hidden;
    transition:transform .12s, filter .2s;
    opacity:.85;
  }
  .cheer-btn:active{transform:scale(.93);}
  .cheer-btn.active{opacity:1;filter:brightness(1.15);box-shadow:0 0 18px currentColor;}
  .cheer-btn .cd{
    position:absolute;left:0;bottom:0;height:100%;
    background:rgba(0,0,0,.42);width:0%;transition:width .1s linear;
  }
  .cheer-btn span{position:relative;z-index:1;}

  .banner{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:6px;
    background:rgba(5,6,14,.78);backdrop-filter:blur(3px);
    z-index:5;opacity:0;pointer-events:none;transition:opacity .5s;
  }
  .banner.show{opacity:1;}
  .banner .who{font-size:26px;font-weight:900;letter-spacing:4px;}
  .banner .sub{font-size:12px;color:var(--dim);letter-spacing:2px;}
</style>
</head>
<body>
  <header>
    <div class="title">TERRITORY&nbsp;WAR&nbsp;<span style="font-size:9px;color:var(--dim);-webkit-text-fill-color:var(--dim);letter-spacing:1px;font-weight:600;">v1.442</span></div>
    <div class="tick" id="tick">T+000</div>
  </header>

  <div class="scoreboard" id="scoreboard"></div>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="banner" id="banner">
      <div class="who" id="bWho"></div>
      <div class="sub">영토 통일 · 자동 재시작</div>
    </div>
  </div>

  <div class="controls">
    <button id="btnPause" class="lit">▮▮ 일시정지</button>
    <div class="speed">
      <button data-s="1" class="lit">x1</button>
      <button data-s="2">x2</button>
      <button data-s="4">x4</button>
    </div>
    <button id="btnReset">↺ 재시작</button>
  </div>

  <div class="cheer" id="cheer">
    <span class="cheer-label">응원 · 5초 연사부스트</span>
    <div class="cheer-row" id="cheerRow"></div>
  </div>

<script>
(()=>{
"use strict";
const N=50, NEUTRAL_TOWERS=18;
const COLORS=[
  {hex:'#ff3b6b',name:'RED'},
  {hex:'#2fd0ff',name:'CYAN'},
  {hex:'#ffd23b',name:'GOLD'},
  {hex:'#7c5cff',name:'VIOLET'},
];
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let DPR=Math.min(window.devicePixelRatio||1,2);
let cell=0, W=0;

function resize(){
  const r=cv.getBoundingClientRect();
  W=Math.floor(r.width);
  cv.width=W*DPR; cv.height=W*DPR;
  cell=W/N;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);

// ---- state ----
let owner;        // Int8Array N*N, -1 neutral, 0..3 team
let bases=[];     // {x,y,team}
let towers=[];    // {x,y,team,angle,spin,cool}
let shells=[];    // {x,y,vx,vy,team,life}
let pickups=[];   // {x,y,kind,pulse}  운빨 강화 장치
let blasts=[];    // {x,y,t,team}  폭발 이펙트
let buffs=[0,0,0,0]; // 팀별 남은 버프 프레임
let buffKind=['','','','']; // 'rate' 또는 'multi'
let pickupTimer=0;
let flashTeam=-1, flashTimer=0;
let tick=0, running=true, speed=1, winner=-1, endTimer=0;

const idx=(x,y)=>y*N+x;
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));

function freeCellAway(occupied,minD){
  for(let tries=0;tries<400;tries++){
    const x=ri(2,N-3), y=ri(2,N-3);
    let ok=true;
    for(const o of occupied){
      if(Math.hypot(o.x-x,o.y-y)<minD){ok=false;break;}
    }
    if(ok) return {x,y};
  }
  return {x:ri(1,N-2),y:ri(1,N-2)};
}

function init(){
  owner=new Int8Array(N*N).fill(-1);
  bases=[]; towers=[]; shells=[]; pickups=[]; blasts=[];
  buffs=[0,0,0,0]; buffKind=['','','',''];
  pickupTimer=rnd(120,240);
  tick=0; winner=-1; endTimer=0;
  hideBanner();

  // 4 bases near the four corners-ish
  const corners=[
    {x:4,y:4},{x:N-5,y:4},{x:4,y:N-5},{x:N-5,y:N-5}
  ];
  // shuffle which team gets which corner
  const order=[0,1,2,3].sort(()=>Math.random()-.5);
  corners.forEach((c,i)=>{
    const t=order[i];
    bases.push({x:c.x,y:c.y,team:t,cool:rnd(0,30),alive:true,bf:0,bk:''});
    paint(c.x,c.y,t,2); // seed a small home area
  });

  // neutral towers
  const occ=bases.map(b=>({x:b.x,y:b.y}));
  for(let i=0;i<NEUTRAL_TOWERS;i++){
    const p=freeCellAway(occ,5);
    occ.push(p);
    towers.push({x:p.x,y:p.y,team:-1,angle:Math.random()*Math.PI*2,
      spin:(Math.random()<.5?-1:1)*rnd(.012,.03),cool:rnd(0,60),bf:0,bk:''});
  }
  updateScoreboard();
}

function paint(cx,cy,team,r){
  for(let y=Math.max(0,cy-r);y<=Math.min(N-1,cy+r);y++)
    for(let x=Math.max(0,cx-r);x<=Math.min(N-1,cx+r);x++)
      if(Math.hypot(x-cx,y-cy)<=r) owner[idx(x,y)]=team;
}

// fire a shell from a structure
function fire(sx,sy,team,angle,rangeMul,blast){
  const sp=0.13;
  const rm=rangeMul||1;
  shells.push({
    x:sx+0.5, y:sy+0.5,
    vx:Math.cos(angle)*sp, vy:Math.sin(angle)*sp,
    team, life:rnd(60,130)*rm, blast:!!blast
  });
}

// aim helper: pick a direction toward nearby enemy/neutral territory
function aimFrom(sx,sy,team){
  // sample a few random outward directions, prefer ones landing on non-own land
  let best=Math.random()*Math.PI*2, bestScore=-1;
  for(let k=0;k<6;k++){
    const a=Math.random()*Math.PI*2;
    const dist=rnd(3,9);
    const tx=Math.round(sx+Math.cos(a)*dist);
    const ty=Math.round(sy+Math.sin(a)*dist);
    if(tx<0||ty<0||tx>=N||ty>=N) continue;
    const o=owner[idx(tx,ty)];
    let s=(o===team)?0:(o===-1?1:2); // enemy land most valuable
    s+=Math.random()*0.5;
    if(s>bestScore){bestScore=s;best=a;}
  }
  return best;
}

function killBase(b, byTeam){
  b.alive=false;
  b.bf=0; b.bk='';
  // every tower that team owns reverts to neutral
  for(const tw of towers){
    if(tw.team===b.team){
      tw.team=-1;
      tw.cool=rnd(20,40);
      tw.bf=0; tw.bk='';
      // neutral towers sit on land — leave the land as is (gets contested anew)
    }
  }
}

function teamCounts(){
  const c=[0,0,0,0];
  for(let i=0;i<owner.length;i++){const o=owner[i];if(o>=0)c[o]++;}
  return c;
}

function structureTeamAt(x,y){
  // which team a structure belongs to follows the land it stands on
  return owner[idx(x,y)];
}

// 구조물(본진/타워) 하나의 유효 버프 종류 목록을 반환
// - 팀 단위(응원 super)와 개별 단위(픽업 rate/multi)를 합쳐서 본다
function activeKinds(team, st){
  const kinds=[];
  if(buffs[team]>0 && buffKind[team]) kinds.push(buffKind[team]); // 응원(팀 전체)
  if(st.bf>0 && st.bk) kinds.push(st.bk);                          // 픽업(이 구조물만)
  return kinds;
}
// 쿨다운 배수: 가장 빠른 효과 채택
function coolMulS(team, st){
  const k=activeKinds(team,st);
  let m=1;
  if(k.includes('super')) m=Math.min(m,0.18);
  if(k.includes('rate'))  m=Math.min(m,0.45);
  return m;
}
// 동시 발사 수: 가장 많은 효과 채택
function volleyS(team, st){
  const k=activeKinds(team,st);
  let v=1;
  if(k.includes('super')) v=Math.max(v,5);
  if(k.includes('multi')) v=Math.max(v,3);
  return v;
}
// 사거리 배수: range 버프가 있으면 3배
function rangeMulS(team, st){
  const k=activeKinds(team,st);
  return k.includes('range') ? 3 : 1;
}
// 광역 폭발 여부: blast 버프가 있으면 true
function blastS(team, st){
  return activeKinds(team,st).includes('blast');
}

// st(구조물)에서 발사 (버프 시 다발 발사)
function firePortS(x,y,team,baseAngle,st){
  const n=volleyS(team,st);
  const rm=rangeMulS(team,st);
  const bl=blastS(team,st);
  if(n===1){ fire(x,y,team,baseAngle,rm,bl); return; }
  for(let i=0;i<n;i++){
    const spread=(i-(n-1)/2)*0.35;
    fire(x,y,team,baseAngle+spread,rm,bl);
  }
}

// team이 base/tower에서 발사 (버프 시 다발 발사)
function firePort(x,y,team,baseAngle){
  const n=volley(team);
  if(n===1){ fire(x,y,team,baseAngle); return; }
  // 부채꼴로 흩뿌림
  for(let i=0;i<n;i++){
    const spread=(i-(n-1)/2)*0.35;
    fire(x,y,team,baseAngle+spread);
  }
}

function step(){
  tick++;

  // bases fire & survival
  for(const b of bases){
    if(!b.alive) continue;
    const cellOwner=owner[idx(b.x,b.y)];
    // base falls if an ENEMY team owns its cell
    if(cellOwner>=0 && cellOwner!==b.team){
      killBase(b, cellOwner);
      continue;
    }
    // otherwise base reclaims & holds its own cell
    owner[idx(b.x,b.y)]=b.team;
    b.cool--;
    if(b.cool<=0){
      firePortS(b.x,b.y,b.team,aimFrom(b.x,b.y,b.team),b);
      b.cool=rnd(14,26)*coolMulS(b.team,b);
    }
  }

  // towers spin; fire only if owned by a team
  for(const tw of towers){
    tw.angle+=tw.spin;
    const land=owner[idx(tw.x,tw.y)];
    if(land!==tw.team){ tw.bf=0; tw.bk=''; } // 점령/이탈 시 개별 버프 소멸
    tw.team=land;
    if(land>=0){
      tw.cool--;
      if(tw.cool<=0){
        firePortS(tw.x,tw.y,land,tw.angle,tw); // rotating turret fires along facing
        tw.cool=rnd(18,30)*coolMulS(land,tw);
      }
    }
  }

  // shells move & paint
  for(let i=shells.length-1;i>=0;i--){
    const s=shells[i];
    s.x+=s.vx; s.y+=s.vy; s.life--;
    const gx=Math.floor(s.x), gy=Math.floor(s.y);
    if(gx<0||gy<0||gx>=N||gy>=N||s.life<=0){shells.splice(i,1);continue;}
    const o=owner[idx(gx,gy)];
    if(o!==s.team){
      if(s.blast){
        paint(gx,gy,s.team,2);             // 반경 2칸 광역 점령
        blasts.push({x:gx,y:gy,t:0,team:s.team});
        shells.splice(i,1);continue;       // 폭발 후 즉시 소멸
      }
      owner[idx(gx,gy)]=s.team;          // capture cell
      if(Math.random()<0.4){             // small splash
        const dx=ri(-1,1),dy=ri(-1,1);
        const nx=gx+dx,ny=gy+dy;
        if(nx>=0&&ny>=0&&nx<N&&ny<N && owner[idx(nx,ny)]!==s.team)
          owner[idx(nx,ny)]=s.team;
      }
      s.life-=18; // shells lose energy on impact
      if(s.life<=0){shells.splice(i,1);continue;}
    }
  }

  // 버프 시간 감소
  for(let t=0;t<4;t++){ if(buffs[t]>0) buffs[t]--; if(cheerCool[t]>0) cheerCool[t]--; }
  // 개별 구조물 픽업 버프 감소
  for(const b of bases){ if(b.bf>0){ b.bf--; if(b.bf<=0) b.bk=''; } }
  for(const tw of towers){ if(tw.bf>0){ tw.bf--; if(tw.bf<=0) tw.bk=''; } }

  // 픽업 스폰
  pickupTimer--;
  if(pickupTimer<=0 && pickups.length<3){
    spawnPickup();
    pickupTimer=rnd(260,460);
  }
  // 픽업 획득: 어떤 팀 영토가 픽업 칸에 닿으면 그 팀이 먹되,
  // 그 팀 소속 본진/타워 중 픽업에 가장 가까운 '하나'에만 버프 적용
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    p.pulse=(p.pulse+0.08)%(Math.PI*2);
    const land=owner[idx(p.x,p.y)];
    if(land>=0){
      const st=nearestStructure(p.x,p.y,land);
      if(st){
        st.bf=600;            // 약 10초
        st.bk=p.kind;
        flashTeam=land; flashTimer=40;
        pickups.splice(i,1);
      }
      // 그 팀에 살아있는 구조물이 없으면(이론상 드묾) 픽업은 남겨둠
    }
  }

  // a base whose cell got captured switches allegiance naturally next frame.
  // win check
  if(tick%15===0) checkWin();
}

// 픽업 위치(px,py)에서 team 소속 살아있는 본진/타워 중 가장 가까운 하나
function nearestStructure(px,py,team){
  let best=null, bestD=Infinity;
  for(const b of bases){
    if(!b.alive || b.team!==team) continue;
    const d=(b.x-px)*(b.x-px)+(b.y-py)*(b.y-py);
    if(d<bestD){bestD=d;best=b;}
  }
  for(const tw of towers){
    if(tw.team!==team) continue;   // 타워는 그 팀 땅에 올라탄 상태여야 소속
    const d=(tw.x-px)*(tw.x-px)+(tw.y-py)*(tw.y-py);
    if(d<bestD){bestD=d;best=tw;}
  }
  return best;
}

function spawnPickup(){
  const occ=[...bases.map(b=>({x:b.x,y:b.y})),...towers.map(t=>({x:t.x,y:t.y})),...pickups];
  const p=freeCellAway(occ,3);
  p.kind=['rate','multi','range','blast'][Math.floor(Math.random()*4)];
  p.pulse=0;
  pickups.push(p);
}

function checkWin(){
  const liveBases=bases.filter(b=>b.alive);
  // last base standing wins
  if(liveBases.length===1){
    winner=liveBases[0].team;
    showBanner(winner);
    return;
  }
  // safety: total wipe of land by one team
  const c=teamCounts();
  const maxT=c.indexOf(Math.max(...c));
  if(c[maxT] >= N*N*0.95){
    winner=maxT; showBanner(winner);
  }
}

// ---- render ----
function draw(){
  ctx.clearRect(0,0,W,W);
  // territory
  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      const o=owner[idx(x,y)];
      if(o<0) continue;
      ctx.fillStyle=COLORS[o].hex;
      ctx.globalAlpha=0.16;
      ctx.fillRect(x*cell,y*cell,cell+0.6,cell+0.6);
    }
  }
  ctx.globalAlpha=1;

  // grid lines (subtle)
  ctx.strokeStyle='rgba(70,80,140,.12)';
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<=N;i++){
    ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,W);
    ctx.moveTo(0,i*cell);ctx.lineTo(W,i*cell);
  }
  ctx.stroke();

  // contested border glow: draw brighter edge where neighbor differs
  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      const o=owner[idx(x,y)];
      if(o<0)continue;
      const right=x<N-1?owner[idx(x+1,y)]:o;
      const down =y<N-1?owner[idx(x,y+1)]:o;
      if(right!==o||down!==o){
        ctx.fillStyle=COLORS[o].hex;
        ctx.globalAlpha=0.5;
        ctx.fillRect(x*cell+cell*0.3,y*cell+cell*0.3,cell*0.4,cell*0.4);
      }
    }
  }
  ctx.globalAlpha=1;

  // pickups (운빨 강화 장치)
  for(const p of pickups){
    const cx=p.x*cell+cell/2, cy=p.y*cell+cell/2;
    const r=cell*(0.42+Math.sin(p.pulse)*0.08);
    const col=p.kind==='rate'?'#ffffff':p.kind==='range'?'#b6ffcf':p.kind==='blast'?'#ffb072':'#aef9ff';
    ctx.save();
    ctx.globalAlpha=0.85;
    ctx.shadowColor=col;ctx.shadowBlur=14;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    // 내부 아이콘: rate=번개, multi=삼지창(세 점), range=양방향 화살표, blast=폭발
    ctx.fillStyle=col;
    if(p.kind==='rate'){
      ctx.beginPath();
      ctx.moveTo(cx+1,cy-r*0.5);ctx.lineTo(cx-r*0.25,cy+r*0.05);
      ctx.lineTo(cx+r*0.02,cy+r*0.05);ctx.lineTo(cx-1,cy+r*0.5);
      ctx.lineTo(cx+r*0.28,cy-r*0.05);ctx.lineTo(cx-r*0.02,cy-r*0.05);
      ctx.closePath();ctx.fill();
    }else if(p.kind==='range'){
      // 가로 양방향 화살표 ↔
      ctx.strokeStyle=col;ctx.lineWidth=2.2;
      ctx.beginPath();
      ctx.moveTo(cx-r*0.5,cy);ctx.lineTo(cx+r*0.5,cy);
      ctx.moveTo(cx-r*0.5,cy);ctx.lineTo(cx-r*0.22,cy-r*0.25);
      ctx.moveTo(cx-r*0.5,cy);ctx.lineTo(cx-r*0.22,cy+r*0.25);
      ctx.moveTo(cx+r*0.5,cy);ctx.lineTo(cx+r*0.22,cy-r*0.25);
      ctx.moveTo(cx+r*0.5,cy);ctx.lineTo(cx+r*0.22,cy+r*0.25);
      ctx.stroke();
    }else if(p.kind==='blast'){
      // 폭발: 가운데 점 + 방사형 빗살
      ctx.beginPath();ctx.arc(cx,cy,r*0.18,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2;
      for(let a=0;a<8;a++){
        const ang=a*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(ang)*r*0.3,cy+Math.sin(ang)*r*0.3);
        ctx.lineTo(cx+Math.cos(ang)*r*0.5,cy+Math.sin(ang)*r*0.5);
        ctx.stroke();
      }
    }else{
      for(let k=-1;k<=1;k++){
        ctx.beginPath();ctx.arc(cx+k*r*0.4,cy,r*0.16,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.restore();
  }
  ctx.shadowBlur=0;ctx.globalAlpha=1;

  // neutral towers
  for(const tw of towers){
    const cx=tw.x*cell+cell/2, cy=tw.y*cell+cell/2;
    const col = tw.team>=0?COLORS[tw.team].hex:'#9aa3c8';
    // body
    ctx.fillStyle = tw.team>=0?col:'#2a3052';
    ctx.strokeStyle=col;
    ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.arc(cx,cy,cell*0.32,0,Math.PI*2);
    ctx.fill();ctx.stroke();
    // barrel (rotating)
    ctx.strokeStyle=col;
    ctx.lineWidth=2.2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(tw.angle)*cell*0.55, cy+Math.sin(tw.angle)*cell*0.55);
    ctx.stroke();
    if(tw.team>=0){
      ctx.globalAlpha=0.25;
      ctx.beginPath();ctx.arc(cx,cy,cell*0.5,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();ctx.globalAlpha=1;
    }
    // 개별 픽업 버프 표시
    if(tw.bf>0){
      const pr=cell*(0.55+Math.sin(tick*0.3)*0.08);
      ctx.strokeStyle='#ffffff';ctx.globalAlpha=0.9;ctx.lineWidth=2;
      ctx.shadowColor='#fff';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
  }

  // bases (diamond)
  for(const b of bases){
    if(!b.alive) continue;
    const t=b.team;
    const col=COLORS[t].hex;
    const cx=b.x*cell+cell/2, cy=b.y*cell+cell/2, r=cell*0.62;
    ctx.save();
    ctx.translate(cx,cy);ctx.rotate(Math.PI/4);
    ctx.fillStyle=col;
    ctx.shadowColor=col;ctx.shadowBlur=12;
    ctx.fillRect(-r/2,-r/2,r,r);
    ctx.restore();
    ctx.shadowBlur=0;
    // core
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(cx,cy,cell*0.13,0,Math.PI*2);ctx.fill();
    // 개별 픽업 버프 표시
    if(b.bf>0){
      const pr=cell*(0.75+Math.sin(tick*0.3)*0.1);
      ctx.strokeStyle='#ffffff';ctx.globalAlpha=0.9;ctx.lineWidth=2;
      ctx.shadowColor='#fff';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
  }

  // 폭발 이펙트 (포탄보다 먼저 그려 아래 깔림)
  for(let i=blasts.length-1;i>=0;i--){
    const b=blasts[i];
    const cx=(b.x+0.5)*cell, cy=(b.y+0.5)*cell;
    const prog=b.t/14;                 // 0→1
    const rad=cell*(0.5+prog*2.2);
    ctx.strokeStyle=COLORS[b.team].hex;
    ctx.globalAlpha=(1-prog)*0.8;
    ctx.lineWidth=3;
    ctx.shadowColor=COLORS[b.team].hex;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    b.t++;
    if(b.t>14) blasts.splice(i,1);
  }

  // shells
  for(const s of shells){
    const cx=s.x*cell, cy=s.y*cell;
    const col=COLORS[s.team].hex;
    const sz=s.blast?cell*0.2:cell*0.12;
    ctx.fillStyle=s.blast?'#ffd9a0':col;
    ctx.shadowColor=col;ctx.shadowBlur=s.blast?12:8;
    ctx.beginPath();ctx.arc(cx,cy,sz,0,Math.PI*2);ctx.fill();
    if(s.blast){ // 폭발탄은 외곽 링 하나 더
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.8;
      ctx.beginPath();ctx.arc(cx,cy,sz*1.6,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.shadowBlur=0;
    // trail
    ctx.strokeStyle=col;ctx.globalAlpha=0.4;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx-s.vx*cell*2.5,cy-s.vy*cell*2.5);ctx.stroke();
    ctx.globalAlpha=1;
  }

  // 획득 순간 화면 테두리 플래시
  if(flashTimer>0){
    const a=flashTimer/40;
    ctx.strokeStyle=COLORS[flashTeam].hex;
    ctx.globalAlpha=a*0.8;
    ctx.lineWidth=10;
    ctx.strokeRect(5,5,W-10,W-10);
    ctx.globalAlpha=1;
    flashTimer--;
  }
}

// ---- scoreboard ----
const sbEl=document.getElementById('scoreboard');
function buildScoreboard(){
  sbEl.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='sb';
    d.innerHTML=`<div class="name" style="color:${c.hex}">${c.name}</div>
      <div class="val" id="val${i}" style="color:${c.hex}">0%</div>
      <div class="fill" id="fill${i}" style="background:${c.hex};width:25%"></div>`;
    sbEl.appendChild(d);
  });
}
function updateScoreboard(){
  const c=teamCounts();const tot=N*N;
  c.forEach((v,i)=>{
    const pct=(v/tot*100);
    let tag = (buffs[i]>0 && buffKind[i]==='super') ? ' 🔥' : '';
    // 이 팀 구조물 중 픽업 버프가 활성인 게 있으면 표시
    if(!tag){
      const has=(kind)=> bases.some(b=>b.alive&&b.team===i&&b.bf>0&&b.bk===kind)
                       || towers.some(t=>t.team===i&&t.bf>0&&t.bk===kind);
      if(has('blast'))      tag=' 💥';
      else if(has('multi')) tag=' ✦';
      else if(has('range')) tag=' ↔';
      else if(has('rate'))  tag=' ⚡';
    }
    document.getElementById('val'+i).textContent=pct.toFixed(0)+'%'+tag;
    document.getElementById('fill'+i).style.width=Math.min(100,pct).toFixed(1)+'%';
  });
}

// ---- banner ----
const banner=document.getElementById('banner');
const bWho=document.getElementById('bWho');
function showBanner(t){
  if(endTimer>0)return;
  bWho.textContent=COLORS[t].name+' 승리';
  bWho.style.color=COLORS[t].hex;
  banner.classList.add('show');
  endTimer=180; // frames until auto-reset
}
function hideBanner(){banner.classList.remove('show');}

// ---- loop ----
const tickEl=document.getElementById('tick');
let acc=0,last=performance.now();
function loop(now){
  const dt=Math.min(50,now-last);last=now;
  if(running && winner<0){
    for(let s=0;s<speed;s++) step();
    acc+=dt;
    if(acc>120){updateScoreboard();tickEl.textContent='T+'+String(tick).padStart(3,'0');acc=0;}
  }
  if(winner>=0){
    endTimer--;
    if(endTimer<=0){ buildScoreboard(); init(); running=true; }
  }
  draw();
  updateCheerUI();
  requestAnimationFrame(loop);
}

// ---- controls ----
const btnPause=document.getElementById('btnPause');
btnPause.addEventListener('click',()=>{
  running=!running;
  btnPause.textContent=running?'▮▮ 일시정지':'▶ 재생';
  btnPause.classList.toggle('lit',running);
});
document.getElementById('btnReset').addEventListener('click',()=>{
  buildScoreboard();init();running=true;
  btnPause.textContent='▮▮ 일시정지';btnPause.classList.add('lit');
});
document.querySelectorAll('.speed button').forEach(b=>{
  b.addEventListener('click',()=>{
    speed=+b.dataset.s;
    document.querySelectorAll('.speed button').forEach(x=>x.classList.remove('lit'));
    b.classList.add('lit');
  });
});

// ---- 응원 버튼 (각 팀 5초 연사 부스트) ----
const CHEER_DURATION=900;   // 15초 @60fps (기존 3배)
const CHEER_COOLDOWN=480;   // 8초 재사용 대기
let cheerCool=[0,0,0,0];    // 팀별 버튼 쿨다운 프레임
const cheerBtns=[];
const cheerRow=document.getElementById('cheerRow');
COLORS.forEach((c,i)=>{
  const btn=document.createElement('button');
  btn.className='cheer-btn';
  btn.style.background=c.hex;
  btn.style.color=c.hex;
  btn.innerHTML=`<span style="color:#06070d">▲ ${c.name}</span><div class="cd"></div>`;
  btn.addEventListener('click',()=>{
    if(cheerCool[i]>0 || winner>=0) return;
    buffs[i]=CHEER_DURATION;
    buffKind[i]='super';
    cheerCool[i]=CHEER_COOLDOWN;
    flashTeam=i; flashTimer=40;
  });
  cheerRow.appendChild(btn);
  cheerBtns.push(btn);
});
function updateCheerUI(){
  for(let i=0;i<4;i++){
    const active=buffs[i]>0 && buffKind[i]==='super';
    cheerBtns[i].classList.toggle('active', active);
    const cd=cheerBtns[i].querySelector('.cd');
    cd.style.width = cheerCool[i]>0 ? (cheerCool[i]/CHEER_COOLDOWN*100)+'%' : '0%';
  }
}

document.addEventListener('visibilitychange',()=>{ if(document.hidden) running=false, btnPause.textContent='▶ 재생', btnPause.classList.remove('lit'); });

// boot
resize();buildScoreboard();init();
requestAnimationFrame(loop);
})();
</script>
