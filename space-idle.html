<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보이드 가든</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400&display=swap');

  :root {
    --void: #04050f;
    --deep: #080b1a;
    --nebula: #0d1235;
    --pulse: #7c6af7;
    --glow: #a89fff;
    --soft: #c4bbff;
    --cream: #e8e4ff;
    --gold: #f5d97a;
    --rose: #f78fa0;
    --mint: #7adfd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--void);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--cream);
    user-select: none;
  }

  /* ── 배경 캔버스 ── */
  #bg { position: fixed; inset: 0; z-index: 0; }

  /* ── 메인 레이아웃 ── */
  #app {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
  }

  /* ── 상단 HUD ── */
  #hud {
    width: 100%; padding: 18px 24px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }

  .hud-block { display: flex; flex-direction: column; gap: 2px; }
  .hud-label { font-size: 10px; letter-spacing: 2px; opacity: 0.45; text-transform: uppercase; }
  .hud-val {
    font-size: 26px; font-family: 'Noto Serif KR', serif; font-weight: 300;
    color: var(--soft);
    text-shadow: 0 0 20px rgba(168,159,255,0.6);
    transition: color 0.3s;
  }
  .hud-val.flash { color: var(--gold) !important; }

  .hud-right { text-align: right; }
  .hud-rate { font-size: 11px; color: var(--mint); opacity: 0.7; margin-top: 2px; letter-spacing: 1px; }

  /* ── 중앙 생명체 영역 ── */
  #center {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    width: 100%;
  }

  /* ── 오브 (핵심 오브젝트) ── */
  #orb-wrap {
    position: relative;
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }

  #orb {
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle at 38% 35%,
      rgba(196,187,255,0.35) 0%,
      rgba(124,106,247,0.55) 35%,
      rgba(13,18,53,0.9) 75%,
      rgba(4,5,15,1) 100%
    );
    box-shadow:
      0 0 40px rgba(124,106,247,0.5),
      0 0 90px rgba(124,106,247,0.2),
      inset 0 0 30px rgba(168,159,255,0.15);
    cursor: pointer;
    transition: transform 0.1s;
    animation: orbFloat 6s ease-in-out infinite;
    position: relative; z-index: 2;
  }

  #orb:active { transform: scale(0.93); }

  @keyframes orbFloat {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* 오브 링 */
  .orb-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(124,106,247,0.3);
    animation: ringExpand 4s ease-out infinite;
    pointer-events: none;
  }
  .orb-ring:nth-child(1) { width: 160px; height: 160px; animation-delay: 0s; }
  .orb-ring:nth-child(2) { width: 185px; height: 185px; animation-delay: 1.3s; }
  .orb-ring:nth-child(3) { width: 200px; height: 200px; animation-delay: 2.6s; }

  @keyframes ringExpand {
    0% { opacity: 0.6; transform: scale(0.9); }
    100% { opacity: 0; transform: scale(1.2); }
  }

  /* 레벨 표시 */
  #level-badge {
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--pulse), #5a4fd4);
    border-radius: 20px; padding: 3px 14px;
    font-size: 11px; letter-spacing: 1px; color: var(--cream);
    box-shadow: 0 0 15px rgba(124,106,247,0.6);
    z-index: 3; white-space: nowrap;
  }

  /* ── 생물 컨테이너 ── */
  #creatures {
    position: absolute; width: 100%; height: 100%;
    pointer-events: none; top: 0; left: 0;
  }

  .creature {
    position: absolute;
    font-size: 20px;
    animation: creatureFloat linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(168,159,255,0.5));
  }

  @keyframes creatureFloat {
    0% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
    25% { transform: translateY(-15px) rotate(5deg); opacity: 1; }
    75% { transform: translateY(10px) rotate(-5deg); opacity: 0.8; }
    100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
  }

  /* ── 하단 정보바 ── */
  #bottom {
    width: 100%;
    padding: 0 20px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* 경험치 바 */
  #xp-wrap {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border-radius: 20px; height: 6px;
    overflow: hidden;
    border: 1px solid rgba(124,106,247,0.2);
  }

  #xp-bar {
    height: 100%; border-radius: 20px;
    background: linear-gradient(90deg, var(--pulse), var(--mint));
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 10px rgba(124,106,247,0.8);
    width: 0%;
  }

  /* 업그레이드 버튼들 */
  #upgrades {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .upg-btn {
    background: rgba(124,106,247,0.08);
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: 16px; padding: 10px 6px;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }

  .upg-btn::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(124,106,247,0.15), transparent 70%);
    opacity: 0; transition: opacity 0.2s;
  }
  .upg-btn:active::before { opacity: 1; }
  .upg-btn:active { transform: scale(0.96); border-color: rgba(124,106,247,0.7); }

  .upg-btn.locked { opacity: 0.3; }
  .upg-btn.affordable { border-color: rgba(124,106,247,0.6); box-shadow: 0 0 12px rgba(124,106,247,0.2); }

  .upg-icon { font-size: 22px; }
  .upg-name { font-size: 9px; letter-spacing: 0.5px; color: var(--soft); opacity: 0.7; }
  .upg-cost { font-size: 10px; color: var(--gold); font-family: 'Noto Serif KR', serif; }
  .upg-count {
    position: absolute; top: 5px; right: 7px;
    font-size: 9px; color: var(--mint); opacity: 0.8;
  }

  /* 메시지 플로팅 */
  .float-msg {
    position: fixed; pointer-events: none; z-index: 100;
    font-family: 'Noto Serif KR', serif; font-weight: 300;
    font-size: 18px; color: var(--gold);
    text-shadow: 0 0 15px rgba(245,217,122,0.8);
    animation: floatUp 1.2s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
  }

  /* 제목 */
  #title-area {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    text-align: center; white-space: nowrap; pointer-events: none;
  }
  #title-area h1 {
    font-family: 'Noto Serif KR', serif; font-weight: 300;
    font-size: 13px; letter-spacing: 4px;
    color: rgba(196,187,255,0.3);
  }

  /* ── 업적 알림 ── */
  #achievement {
    position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, rgba(13,18,53,0.95), rgba(8,11,26,0.98));
    border: 1px solid rgba(124,106,247,0.5);
    border-radius: 20px; padding: 12px 24px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 0 30px rgba(124,106,247,0.3);
    transition: top 0.5s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200; width: 300px; max-width: 90vw;
  }
  #achievement.show { top: 20px; }
  #ach-icon { font-size: 28px; }
  #ach-text { display: flex; flex-direction: column; gap: 2px; }
  #ach-title { font-size: 10px; letter-spacing: 2px; color: var(--gold); opacity: 0.8; }
  #ach-desc { font-size: 14px; color: var(--soft); }

  /* 우주 소음 텍스트 */
  #whisper {
    position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(196,187,255,0.15);
    letter-spacing: 3px; white-space: nowrap;
    animation: whisperFade 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes whisperFade {
    0%,100% { opacity: 0; }
    30%,70% { opacity: 1; }
  }

  /* ── 오프라인 보상 팝업 ── */
  #offline-popup {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    background: rgba(4,5,15,0.85);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  #offline-popup.show { opacity: 1; pointer-events: all; }
  #offline-card {
    background: linear-gradient(160deg, rgba(13,18,53,0.98), rgba(8,11,26,0.99));
    border: 1px solid rgba(124,106,247,0.45);
    border-radius: 28px; padding: 36px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    box-shadow: 0 0 60px rgba(124,106,247,0.25), 0 0 120px rgba(124,106,247,0.08);
    max-width: 300px; width: 85vw; text-align: center;
    animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes cardPop {
    from { transform: scale(0.8) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  #offline-card .oc-star { font-size: 48px; }
  #offline-card .oc-title {
    font-size: 11px; letter-spacing: 3px; color: var(--gold); opacity: 0.7;
  }
  #offline-card .oc-time {
    font-size: 13px; color: rgba(196,187,255,0.5); letter-spacing: 1px;
  }
  #offline-card .oc-amount {
    font-family: 'Noto Serif KR', serif; font-weight: 300;
    font-size: 38px; color: var(--soft);
    text-shadow: 0 0 30px rgba(168,159,255,0.7);
  }
  #offline-card .oc-unit { font-size: 11px; color: var(--mint); letter-spacing: 2px; margin-top: -10px; }
  #offline-card .oc-desc { font-size: 12px; color: rgba(196,187,255,0.4); line-height: 1.7; }
  #offline-btn {
    margin-top: 8px;
    background: linear-gradient(135deg, var(--pulse), #5a4fd4);
    border: none; border-radius: 50px; padding: 14px 40px;
    font-family: 'Gowun Dodum', sans-serif; font-size: 14px;
    color: var(--cream); cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 0 20px rgba(124,106,247,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #offline-btn:active { transform: scale(0.96); }

  /* 저장 인디케이터 */
  #save-dot {
    position: fixed; bottom: 10px; right: 14px;
    font-size: 9px; color: rgba(122,223,212,0.35);
    letter-spacing: 1px; z-index: 10;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="app">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Stardust</span>
      <span class="hud-val" id="pts">0</span>
    </div>
    <div id="title-area"><h1>✦ VOID GARDEN ✦</h1></div>
    <div class="hud-block hud-right">
      <span class="hud-label">per sec</span>
      <span class="hud-val" id="pps">0</span>
      <span class="hud-rate" id="rate-txt">자동 수집 중...</span>
    </div>
  </div>

  <!-- 중앙 -->
  <div id="center">
    <div id="creatures"></div>
    <div id="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div id="orb"></div>
      <div id="level-badge">Lv.1 씨앗</div>
    </div>
    <div id="whisper">우주는 조용히 팽창한다</div>
  </div>

  <!-- 하단 -->
  <div id="bottom">
    <div id="xp-wrap"><div id="xp-bar"></div></div>
    <div id="upgrades">
      <div class="upg-btn" id="upg-0" onclick="buyUpgrade(0)">
        <span class="upg-count" id="cnt-0">0</span>
        <span class="upg-icon">🌱</span>
        <span class="upg-name">성운 씨앗</span>
        <span class="upg-cost" id="cost-0">10</span>
      </div>
      <div class="upg-btn" id="upg-1" onclick="buyUpgrade(1)">
        <span class="upg-count" id="cnt-1">0</span>
        <span class="upg-icon">🌙</span>
        <span class="upg-name">달의 파편</span>
        <span class="upg-cost" id="cost-1">75</span>
      </div>
      <div class="upg-btn" id="upg-2" onclick="buyUpgrade(2)">
        <span class="upg-count" id="cnt-2">0</span>
        <span class="upg-icon">⭐</span>
        <span class="upg-name">별의 숨결</span>
        <span class="upg-cost" id="cost-2">500</span>
      </div>
      <div class="upg-btn" id="upg-3" onclick="buyUpgrade(3)">
        <span class="upg-count" id="cnt-3">0</span>
        <span class="upg-icon">🪐</span>
        <span class="upg-name">행성 수확기</span>
        <span class="upg-cost" id="cost-3">3000</span>
      </div>
      <div class="upg-btn" id="upg-4" onclick="buyUpgrade(4)">
        <span class="upg-count" id="cnt-4">0</span>
        <span class="upg-icon">🌌</span>
        <span class="upg-name">은하 공명</span>
        <span class="upg-cost" id="cost-4">20000</span>
      </div>
      <div class="upg-btn" id="upg-5" onclick="buyUpgrade(5)">
        <span class="upg-count" id="cnt-5">0</span>
        <span class="upg-icon">🔮</span>
        <span class="upg-name">보이드 코어</span>
        <span class="upg-cost" id="cost-5">150000</span>
      </div>
    </div>
  </div>
</div>

<!-- 업적 알림 -->
<div id="achievement">
  <span id="ach-icon">✨</span>
  <div id="ach-text">
    <span id="ach-title">업적 달성</span>
    <span id="ach-desc">별의 씨앗 발아</span>
  </div>
</div>

<!-- 오프라인 보상 팝업 -->
<div id="offline-popup">
  <div id="offline-card">
    <div class="oc-star">🌌</div>
    <div class="oc-title">WELCOME BACK</div>
    <div class="oc-time" id="oc-time">3시간 동안 자리를 비웠어요</div>
    <div class="oc-amount" id="oc-amount">0</div>
    <div class="oc-unit">STARDUST 수집됨</div>
    <div class="oc-desc" id="oc-desc">우주는 당신 없이도<br>조용히 빛나고 있었어요</div>
    <button id="offline-btn" onclick="claimOffline()">✦ 수집하기</button>
  </div>
</div>

<div id="save-dot">● 자동저장</div>

<script>
// ══════════════════════════════════════
// 배경 별 파티클 시스템
// ══════════════════════════════════════
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let stars = [], nebulas = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 별 생성 — 160 → 80개로 감소
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 0.15 + 0.02,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    color: ['rgba(255,255,255', 'rgba(168,159,255', 'rgba(122,223,212', 'rgba(245,217,122'][Math.floor(Math.random()*4)]
  });
}

// 성운 블롭 — 5 → 3개로 감소, gradient 캐싱
for (let i = 0; i < 3; i++) {
  nebulas.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 120 + 60,
    hue: [247, 180, 320, 200][Math.floor(Math.random()*4)],
    opacity: Math.random() * 0.04 + 0.01,
    drift: Math.random() * 0.2 - 0.1
  });
}

let frame = 0;
let bgRunning = true;  // 백그라운드 감지 시 false
let lastBgTime = 0;
const BG_FPS = 30; // 60 → 30fps로 제한
const BG_INTERVAL = 1000 / BG_FPS;

function drawBg(now) {
  if (!bgRunning) return;
  requestAnimationFrame(drawBg);
  if (now - lastBgTime < BG_INTERVAL) return; // 30fps 초과 프레임 스킵
  lastBgTime = now;

  ctx.clearRect(0, 0, W, H);
  // 배경 (매번 gradient 생성 대신 고정 fillRect로 최적화)
  ctx.fillStyle = '#07102a';
  ctx.fillRect(0, 0, W, H);

  // 성운 (3개만)
  nebulas.forEach(n => {
    n.x += n.drift * 0.1;
    if (n.x > W+n.r) n.x = -n.r;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, `hsla(${n.hue},70%,60%,${n.opacity})`);
    g.addColorStop(1, `hsla(${n.hue},70%,60%,0)`);
    ctx.fillStyle = g; ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
  });

  // 별 (80개)
  frame++;
  stars.forEach(s => {
    s.y += s.speed; s.twinkle += s.twinkleSpeed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `${s.color},${alpha})`;
    ctx.fill();
  });

  // 유성 (드물게)
  if (frame % 420 === 0) spawnMeteor();
}
requestAnimationFrame(drawBg);

let meteors = [];
function spawnMeteor() {
  const sx = Math.random() * W;
  meteors.push({ x: sx, y: -10, vx: Math.random()*3+1, vy: Math.random()*3+4, life: 1 });
}

// ══════════════════════════════════════
// 게임 로직
// ══════════════════════════════════════
let pts = 0, pps = 0, totalEarned = 0;
let xp = 0, level = 1, xpNeeded = 50;
let clickPower = 1;

const UPGRADES = [
  { name: '성운 씨앗', base: 10, basePps: 0.1, count: 0 },
  { name: '달의 파편', base: 75, basePps: 0.5, count: 0 },
  { name: '별의 숨결', base: 500, basePps: 3, count: 0 },
  { name: '행성 수확기', base: 3000, basePps: 20, count: 0 },
  { name: '은하 공명', base: 20000, basePps: 150, count: 0 },
  { name: '보이드 코어', base: 150000, basePps: 1200, count: 0 },
];

const LEVELS = [
  { lv:1, name:'씨앗', xp:50 },
  { lv:2, name:'새싹', xp:200 },
  { lv:3, name:'별꽃', xp:800 },
  { lv:4, name:'성운체', xp:3000 },
  { lv:5, name:'행성령', xp:12000 },
  { lv:6, name:'항성수', xp:50000 },
  { lv:7, name:'은하몽', xp:200000 },
  { lv:8, name:'보이드신', xp:Infinity },
];

const CREATURE_EMOJIS = ['🌸','✨','🦋','🌿','🔮','💫','🌙','⭐','🌊','🎐','🕊️','🫧'];
let creatureList = [];

const WHISPERS = [
  '우주는 조용히 팽창한다', '별빛은 수만 년 전의 기억',
  '모든 것은 별의 먼지', '고요함 속에서 자란다',
  '시간은 별처럼 흐른다', '존재는 진동한다'
];
let whisperIdx = 0;

function getUpgradeCost(i) {
  return Math.floor(UPGRADES[i].base * Math.pow(1.15, UPGRADES[i].count));
}

function recalcPps() {
  pps = UPGRADES.reduce((sum, u) => sum + u.basePps * u.count, 0);
}

function fmt(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

function updateHUD() {
  document.getElementById('pts').textContent = fmt(pts);
  document.getElementById('pps').textContent = fmt(pps);

  // XP 바
  const pct = Math.min((xp / xpNeeded) * 100, 100);
  document.getElementById('xp-bar').style.width = pct + '%';

  // 업그레이드 버튼
  UPGRADES.forEach((u, i) => {
    const cost = getUpgradeCost(i);
    const btn = document.getElementById(`upg-${i}`);
    const costEl = document.getElementById(`cost-${i}`);
    const cntEl = document.getElementById(`cnt-${i}`);
    costEl.textContent = fmt(cost);
    cntEl.textContent = u.count > 0 ? u.count : '';
    if (pts >= cost) {
      btn.classList.add('affordable');
      btn.classList.remove('locked');
    } else {
      btn.classList.remove('affordable');
    }
  });
}

function gainPts(amount, isClick = false, x, y) {
  pts += amount;
  totalEarned += amount;
  xp += amount;

  if (isClick) {
    spawnFloatMsg(`+${fmt(amount)}`, x, y);
    // 클릭 파동
    document.getElementById('orb').style.boxShadow = `0 0 60px rgba(124,106,247,0.9), 0 0 120px rgba(124,106,247,0.4), inset 0 0 40px rgba(168,159,255,0.3)`;
    setTimeout(() => {
      document.getElementById('orb').style.boxShadow = '';
    }, 300);
  }

  checkLevelUp();
  updateHUD();
}

function checkLevelUp() {
  const next = LEVELS.find(l => l.lv === level);
  if (next && xp >= next.xp) {
    level++;
    xp = 0;
    const newLvl = LEVELS.find(l => l.lv === level);
    xpNeeded = newLvl ? newLvl.xp : Infinity;
    document.getElementById('level-badge').textContent = `Lv.${level} ${LEVELS[level-1]?.name || ''}`;
    clickPower = Math.floor(1 + level * 0.5);
    showAchievement('레벨 업!', `Lv.${level} ${LEVELS[level-1]?.name || '보이드신'}`);
    spawnCreature();
    // 레벨업 파티클
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const w = window.innerWidth, h = window.innerHeight;
        spawnFloatMsg(['✨','💫','⭐'][Math.floor(Math.random()*3)],
          w*0.3 + Math.random()*w*0.4, h*0.3 + Math.random()*h*0.4);
      }, i * 80);
    }
  }
}

function buyUpgrade(i) {
  const cost = getUpgradeCost(i);
  if (pts < cost) return;
  pts -= cost;
  UPGRADES[i].count++;
  recalcPps();
  updateHUD();
  // 피드백
  const btn = document.getElementById(`upg-${i}`);
  btn.style.background = 'rgba(124,106,247,0.25)';
  setTimeout(() => { btn.style.background = ''; }, 300);
  // 5개마다 업적
  if (UPGRADES[i].count % 5 === 0) {
    showAchievement('수집가', `${UPGRADES[i].name} × ${UPGRADES[i].count}`);
  }
}

// 플로팅 메시지
function spawnFloatMsg(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-msg';
  el.textContent = text;
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// 생명체 스폰
function spawnCreature() {
  const center = document.getElementById('center');
  const rect = center.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'creature';
  el.textContent = CREATURE_EMOJIS[Math.floor(Math.random() * CREATURE_EMOJIS.length)];
  const side = Math.random() > 0.5;
  el.style.left = (side ? Math.random()*30 : Math.random()*30+65) + '%';
  el.style.top = (Math.random()*70 + 10) + '%';
  el.style.animationDuration = (4 + Math.random() * 5) + 's';
  el.style.animationDelay = (-Math.random() * 5) + 's';
  el.style.fontSize = (14 + Math.random() * 14) + 'px';
  document.getElementById('creatures').appendChild(el);
  creatureList.push(el);
  // 최대 12마리로 제한 (배터리 절약)
  if (creatureList.length > 12) {
    creatureList[0].remove();
    creatureList.shift();
  }
}

// 업적
let achTimeout;
function showAchievement(title, desc, icon='✨') {
  const el = document.getElementById('achievement');
  document.getElementById('ach-icon').textContent = icon;
  document.getElementById('ach-title').textContent = title;
  document.getElementById('ach-desc').textContent = desc;
  el.classList.add('show');
  clearTimeout(achTimeout);
  achTimeout = setTimeout(() => el.classList.remove('show'), 3000);
}

// 속삭임 교체
setInterval(() => {
  whisperIdx = (whisperIdx + 1) % WHISPERS.length;
  document.getElementById('whisper').textContent = WHISPERS[whisperIdx];
}, 9000);

// ── 오브 탭 ──
document.getElementById('orb').addEventListener('click', (e) => {
  const r = e.target.getBoundingClientRect();
  gainPts(clickPower, true, r.left + r.width/2, r.top);
  // 포인트 HUD 플래시
  const hv = document.getElementById('pts');
  hv.classList.add('flash');
  setTimeout(() => hv.classList.remove('flash'), 300);
});

// ── 자동 수집 틱 — rAF 대신 1초 setInterval (배터리 절약) ──
setInterval(() => {
  if (pps > 0) gainPts(pps);
  updateHUD();
}, 1000);

// ── 마일스톤 업적 ──
const milestones = [100, 1000, 10000, 100000, 1e6];
let nextMilestone = 0;
setInterval(() => {
  if (nextMilestone < milestones.length && totalEarned >= milestones[nextMilestone]) {
    showAchievement('마일스톤', `${fmt(milestones[nextMilestone])} 스타더스트 수집!`, '🌌');
    nextMilestone++;
  }
}, 1000);

// ══════════════════════════════════════
// 저장 / 불러오기 시스템
// ══════════════════════════════════════
const SAVE_KEY = 'voidgarden_v1';
const MAX_OFFLINE_SEC = 8 * 3600; // 최대 8시간 오프라인 수익

function saveGame() {
  const data = {
    pts, totalEarned, xp, level, xpNeeded, clickPower,
    upgrades: UPGRADES.map(u => u.count),
    creatureCount: creatureList.length,
    savedAt: Date.now()
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    // 저장 인디케이터 깜빡임
    const dot = document.getElementById('save-dot');
    dot.style.color = 'rgba(122,223,212,0.8)';
    setTimeout(() => { dot.style.color = 'rgba(122,223,212,0.25)'; }, 600);
  } catch(e) {}
}

let offlineGain = 0;

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);

    pts         = d.pts || 0;
    totalEarned = d.totalEarned || 0;
    xp          = d.xp || 0;
    level       = d.level || 1;
    clickPower  = d.clickPower || 1;

    // 업그레이드 복원
    if (d.upgrades) {
      d.upgrades.forEach((cnt, i) => { if (UPGRADES[i]) UPGRADES[i].count = cnt; });
    }
    recalcPps();

    // xpNeeded 복원
    const lvData = LEVELS.find(l => l.lv === level);
    xpNeeded = lvData ? lvData.xp : Infinity;

    // 레벨 뱃지 복원
    document.getElementById('level-badge').textContent =
      `Lv.${level} ${LEVELS[level-1]?.name || '보이드신'}`;

    // 생명체 복원
    const cnt = Math.min(d.creatureCount || 0, 20);
    for (let i = 0; i < cnt; i++) spawnCreature();

    // 마일스톤 포인터 복원
    while (nextMilestone < milestones.length && totalEarned >= milestones[nextMilestone]) {
      nextMilestone++;
    }

    // ── 오프라인 수익 계산 ──
    if (d.savedAt && pps > 0) {
      const elapsed = Math.min((Date.now() - d.savedAt) / 1000, MAX_OFFLINE_SEC);
      if (elapsed > 30) { // 30초 이상 자리 비웠을 때만
        offlineGain = pps * elapsed * 0.5; // 50% 효율
        showOfflinePopup(elapsed, offlineGain);
        return true;
      }
    }
    return true;
  } catch(e) { return false; }
}

function fmtTime(sec) {
  if (sec < 60) return `${Math.floor(sec)}초`;
  if (sec < 3600) return `${Math.floor(sec/60)}분`;
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
}

function showOfflinePopup(elapsed, gain) {
  document.getElementById('oc-time').textContent = `${fmtTime(elapsed)} 동안 자리를 비웠어요`;
  document.getElementById('oc-amount').textContent = fmt(gain);

  const msgs = [
    '우주는 당신 없이도\n조용히 빛나고 있었어요',
    '별들이 당신을 기다리며\n스타더스트를 모았어요',
    '고요한 시간 속에서\n우주는 계속 팽창했어요',
    '생명체들이 열심히\n수집해뒀어요 🌿'
  ];
  document.getElementById('oc-desc').innerHTML =
    msgs[Math.floor(Math.random()*msgs.length)].replace('\n','<br>');

  document.getElementById('offline-popup').classList.add('show');
}

function claimOffline() {
  if (offlineGain > 0) {
    gainPts(offlineGain);
    offlineGain = 0;
  }
  document.getElementById('offline-popup').classList.remove('show');
}

// ── 자동 저장 (30초마다) ──
setInterval(saveGame, 30000);
// ── 탭 닫힐 때 저장 ──
window.addEventListener('beforeunload', saveGame);
window.addEventListener('pagehide', saveGame);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    bgRunning = false; // 캔버스 루프 완전 정지
    saveGame();
  } else {
    bgRunning = true;  // 복귀 시 재시작
    requestAnimationFrame(drawBg);
  }
});

// ── 게임 시작: 불러오기 시도 ──
const loaded = loadGame();

// 처음 시작 시에만 생명체 초기 스폰
if (!loaded || creatureList.length === 0) {
  setTimeout(() => spawnCreature(), 500);
  setTimeout(() => spawnCreature(), 1500);
}

updateHUD();
</script>
</body>
</html>
