<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>漢字でGO 감상</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#0a0612; --neon:#ff2bd6; --cyan:#21f5ff; --amber:#ffd24a; --soft:#c9b8ff;
  }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(255,43,214,.10), transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(33,245,255,.10), transparent 45%),
      var(--bg);
    color:#fff;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    height:100dvh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 14px);
  }
  .stage{
    width:100%; max-width:560px; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; position:relative;
  }
  .id{
    position:absolute; top:0; left:0;
    font-family:"Courier New",monospace; font-size:12px; letter-spacing:1px;
    color:var(--cyan); opacity:.55;
  }
  .counter{
    position:absolute; top:0; right:0;
    font-family:"Courier New",monospace; font-size:12px; letter-spacing:1px;
    color:var(--soft); opacity:.55;
  }
  .kanji{
    font-size:clamp(72px, 22vw, 150px);
    line-height:1.1; font-weight:600;
    color:#fff;
    text-shadow:0 0 14px rgba(255,43,214,.65), 0 0 34px rgba(255,43,214,.35);
    word-break:break-all;
    animation:pop .5s ease;
  }
  .yomi{
    margin-top:22px;
    font-size:clamp(24px, 7vw, 40px);
    color:var(--cyan);
    text-shadow:0 0 12px rgba(33,245,255,.6);
    letter-spacing:2px;
    opacity:0; transform:translateY(8px);
    transition:opacity .5s ease, transform .5s ease;
  }
  .meaningBox{
    margin-top:26px;
    max-width:90%;
    opacity:0; transform:translateY(10px);
    transition:opacity .55s ease, transform .55s ease;
  }
  .meaning{
    font-size:clamp(16px, 4.6vw, 22px);
    line-height:1.65; color:#f3eaff;
  }
  .extra{
    margin-top:14px;
    font-size:clamp(13px, 3.6vw, 16px);
    line-height:1.7; color:var(--amber); opacity:.92;
  }
  .extra .tag{
    display:inline-block; color:var(--neon);
    font-size:.85em; margin-right:6px; opacity:.85;
  }
  .show{ opacity:1 !important; transform:translateY(0) !important; }
  .progress{
    position:absolute; bottom:0; left:0; right:0; height:3px;
    background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden;
  }
  .bar{
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--neon),var(--cyan));
    box-shadow:0 0 8px var(--neon);
  }
  @keyframes pop{ from{opacity:0; transform:scale(.92);} to{opacity:1; transform:scale(1);} }
  .hint{
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    font-family:"Courier New",monospace; font-size:11px; color:var(--soft); opacity:.4;
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="id" id="qid"></div>
    <div class="counter" id="count"></div>
    <div class="kanji" id="kanji"></div>
    <div class="yomi" id="yomi"></div>
    <div class="meaningBox" id="meaningBox">
      <div class="meaning" id="meaning"></div>
      <div class="extra" id="extra"></div>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="hint" id="hint">tap to pause</div>
  </div>

];

// 매 실행마다 순서를 섞는다 (Fisher–Yates)
for(let i=DATA.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [DATA[i],DATA[j]]=[DATA[j],DATA[i]];
}

const stage=document.getElementById('stage');
const elId=document.getElementById('qid');
const elCount=document.getElementById('count');
const elKanji=document.getElementById('kanji');
const elYomi=document.getElementById('yomi');
const elMeaningBox=document.getElementById('meaningBox');
const elMeaning=document.getElementById('meaning');
const elExtra=document.getElementById('extra');
const elBar=document.getElementById('bar');

const T_KANJI=3000, T_YOMI=2000, T_MEAN=2000;
const TOTAL=T_KANJI+T_YOMI+T_MEAN;

let idx=0, paused=false, startTime=0, elapsedAtPause=0, rafId=null, timers=[];

function clearTimers(){ timers.forEach(t=>clearTimeout(t)); timers=[]; }

function render(){
  const d=DATA[idx];
  // 1) 먼저 트랜지션 끄고 즉시 숨긴다 (이전 카드 잔상 방지)
  elYomi.style.transition='none';
  elMeaningBox.style.transition='none';
  elYomi.classList.remove('show');
  elMeaningBox.classList.remove('show');
  // 2) 내용 교체
  elId.textContent=d.id;
  elCount.textContent=(idx+1)+" / "+DATA.length;
  elKanji.textContent=d.k;
  elKanji.style.animation='none'; void elKanji.offsetWidth; elKanji.style.animation='pop .5s ease';
  elYomi.textContent=d.y;
  elMeaning.textContent=d.m;
  if(d.x){
    elExtra.innerHTML='<span class="tag">別行</span>'+d.x;
  } else { elExtra.innerHTML=''; }
  // 3) 강제 리플로우 후 트랜지션 복구 (이후 show는 다시 부드럽게)
  void elYomi.offsetWidth;
  elYomi.style.transition='';
  elMeaningBox.style.transition='';
}

function scheduleFrom(offset){
  // offset = ms already elapsed in current card
  clearTimers();
  if(offset < T_KANJI){
    timers.push(setTimeout(()=>elYomi.classList.add('show'), T_KANJI-offset));
  } else {
    elYomi.classList.add('show');
  }
  if(offset < T_KANJI+T_YOMI){
    timers.push(setTimeout(()=>elMeaningBox.classList.add('show'), (T_KANJI+T_YOMI)-offset));
  } else {
    elMeaningBox.classList.add('show');
  }
  if(offset < TOTAL){
    timers.push(setTimeout(next, TOTAL-offset));
  } else {
    next();
  }
}

function tickBar(){
  if(paused) return;
  const e=elapsedAtPause+(performance.now()-startTime);
  const pct=Math.min(100, (e/TOTAL)*100);
  elBar.style.width=pct+'%';
  rafId=requestAnimationFrame(tickBar);
}

function startCard(){
  render();
  elapsedAtPause=0;
  startTime=performance.now();
  elBar.style.width='0%';
  scheduleFrom(0);
  cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tickBar);
}

function next(){
  idx++;
  if(idx>=DATA.length){
    // 다 돌면 다시 섞고 처음부터
    for(let i=DATA.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [DATA[i],DATA[j]]=[DATA[j],DATA[i]];
    }
    idx=0;
  }
  startCard();
}

function pause(){
  if(paused) return;
  paused=true;
  elapsedAtPause+=performance.now()-startTime;
  clearTimers();
  cancelAnimationFrame(rafId);
  document.getElementById('hint').textContent='paused — tap to resume';
}
function resume(){
  if(!paused) return;
  paused=false;
  startTime=performance.now();
  scheduleFrom(elapsedAtPause);
  rafId=requestAnimationFrame(tickBar);
  document.getElementById('hint').textContent='tap to pause';
}

stage.addEventListener('click', ()=> paused?resume():pause());
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) pause(); });

startCard();
</script>
</body>
</html>
