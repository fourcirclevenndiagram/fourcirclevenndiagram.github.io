<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Catalyst CLI</title>
<style>
  :root{
    --bg:#0a0e0a;
    --panel:#0d130d;
    --amber:#f0a500;
    --green:#33ff66;
    --dim:#1f6b32;
    --gray:#6a7a6a;
    --err:#ff5b5b;
    --cyan:#3ad6e0;
    --line:#162616;
    --bezel:#05080500;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:
      radial-gradient(120% 80% at 50% 0%, #0f160f 0%, #060906 70%) ,
      #060906;
    color:var(--green);
    font-family:"SF Mono","Cascadia Code","Roboto Mono",ui-monospace,Menlo,Consolas,monospace;
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select:none;
  }
  /* scanline + flicker atmosphere */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.18) 3px);
    mix-blend-mode:multiply;
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:51;
    background:radial-gradient(140% 120% at 50% 50%, transparent 60%, rgba(0,0,0,.55) 100%);
  }

  header{
    flex:0 0 auto;
    display:flex;align-items:center;gap:8px;
    padding:9px 14px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0c120c,#080c08);
    font-size:11px;letter-spacing:.5px;
    z-index:10;
  }
  .led{width:8px;height:8px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:blink 2.4s infinite;}
  @keyframes blink{0%,92%,100%{opacity:1}94%{opacity:.25}}
  .hw{color:var(--gray);}
  .hw b{color:var(--amber);font-weight:600;}
  .pps{margin-left:auto;color:var(--dim);font-size:10px;}
  #cmdcount{color:#33442f;letter-spacing:.5px;font-variant-numeric:tabular-nums;}

  #screen{
    flex:1 1 auto;
    overflow-y:auto;
    overflow-x:hidden;
    padding:12px 14px 4px;
    font-size:13px;
    line-height:1.45;
    -webkit-overflow-scrolling:touch;
    text-shadow:0 0 3px rgba(51,255,102,.35);
    z-index:5;
  }
  #screen::-webkit-scrollbar{width:0;}
  .ln{white-space:pre-wrap;word-break:break-word;}
  .prompt{color:var(--green);}
  .cmd{color:#dfffe5;}
  .out{color:#9fe6ad;}
  .hdr{color:var(--cyan);}
  .amber{color:var(--amber);}
  .err{color:var(--err);}
  .gray{color:var(--gray);}
  .ok{color:var(--green);}

  /* input line */
  #inputline{
    flex:0 0 auto;
    display:flex;align-items:center;
    padding:8px 12px;
    border-top:1px solid var(--line);
    background:linear-gradient(180deg,#0a100a,#070a07);
    z-index:10;
  }
  #ps{color:var(--green);font-size:13px;white-space:nowrap;margin-right:6px;text-shadow:0 0 4px rgba(51,255,102,.4);}
  #inp{
    flex:1;background:transparent;border:none;outline:none;
    color:#eaffee;font-family:inherit;font-size:13px;
    caret-color:transparent;
  }
  #curwrap{position:relative;}
  #cursor{
    display:inline-block;width:8px;height:15px;background:var(--green);
    vertical-align:-2px;margin-left:1px;box-shadow:0 0 6px var(--green);
    animation:cur 1.05s steps(1) infinite;
  }
  @keyframes cur{50%{opacity:0}}
  #enter{
    flex:0 0 auto;margin-left:8px;
    background:var(--line);color:var(--green);
    border:1px solid var(--dim);border-radius:5px;
    font-family:inherit;font-size:12px;padding:7px 13px;
    letter-spacing:1px;
  }
  #enter:active{background:var(--dim);color:#000;}

  /* quick command chips */
  #chips{
    flex:0 0 auto;
    display:flex;gap:6px;overflow-x:auto;
    padding:7px 12px 9px;
    border-top:1px solid var(--line);
    background:#070a07;
    z-index:10;
  }
  #chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    background:#0e160e;color:var(--dim);
    border:1px solid var(--line);border-radius:20px;
    font-family:inherit;font-size:11px;padding:6px 12px;white-space:nowrap;
  }
  .chip:active{color:var(--green);border-color:var(--dim);}
  .typing{opacity:.6;}
</style>
</head>
<body>
  <header>
    <span class="led"></span>
    <span class="hw">CATALYST <b>C2960-X</b> · IOS 15.2(7)E</span>
    <span class="pps">SYST&nbsp;●&nbsp;<span class="ok">OK</span><span id="cmdcount">&nbsp;&nbsp;cmd 0</span></span>
  </header>

  <div id="screen"></div>

  <div id="inputline">
    <span id="ps">Switch&gt;</span>
    <span id="curwrap"><input id="inp" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send"><span id="cursor"></span></span>
    <button id="enter">ENTER</button>
  </div>

  <div id="chips"></div>

const cursor = document.getElementById('cursor');

let curIf = '';
let hostname = 'Switch';

/* prevent double-tap zoom */
let lastTouch=0;
document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouch<=300){e.preventDefault();}lastTouch=n;},{passive:false});

function promptStr(){
  if(mode==='user') return hostname+'>';
  if(mode==='priv') return hostname+'#';
  if(mode==='config') return hostname+'(config)#';
  if(mode==='config-if') return hostname+(/^range/i.test(curIf)?'(config-if-range)#':'(config-if)#');
}
function refreshPrompt(){ ps.textContent = promptStr(); }

function out(text, cls){
  const div=document.createElement('div');
  div.className='ln '+(cls||'out');
  div.textContent=text;
  screen.appendChild(div);
  screen.scrollTop=screen.scrollHeight;
}
function echoCmd(cmd){
  const div=document.createElement('div');
  div.className='ln';
  div.innerHTML='<span class="prompt">'+promptStr().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span> <span class="cmd">'+cmd.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>';
  screen.appendChild(div);
  screen.scrollTop=screen.scrollHeight;
}
function blank(){ out('\u200b','out'); }

/* ---- command handling ---- */
function handle(raw){
  const cmd = raw.trim();
  echoCmd(cmd);
  if(cmd==='') return;
  history.unshift(cmd); hIdx=-1;
  cmdCount++;
  const cc=document.getElementById('cmdcount');
  if(cc) cc.textContent='\u00a0\u00a0cmd '+cmdCount;
  const c = cmd.toLowerCase();
  const tok = c.split(/\s+/);

  // global
  if(c==='?'){ showHelp(); return; }
  if(c==='cls'||c==='clear'){ screen.innerHTML=''; return; }

  // mode transitions
  if(c==='enable'||c==='en'){
    if(mode==='user'){ mode='priv'; refreshPrompt(); }
    else out('% Already in privileged mode.','gray');
    return;
  }
  if(c==='disable'){ if(mode!=='user'){ mode='user'; refreshPrompt(); } return; }
  if(c==='exit'||c==='end'||c==='quit'){
    if(mode==='config-if'){ mode = (c==='end')?'priv':'config'; curIf=''; }
    else if(mode==='config'){ mode='priv'; }
    else if(mode==='priv'){ mode='user'; }
    else { out(''); }
    refreshPrompt(); return;
  }

  // require privilege for config / show
  if(c==='configure terminal'||c==='conf t'||c==='config t'||c==='configure'){
    if(mode==='priv'){ mode='config'; refreshPrompt();
      out('Enter configuration commands, one per line.  End with CNTL/Z.','gray'); }
    else out('% Invalid input detected. Enter privileged mode first (enable).','err');
    return;
  }

  if(mode==='config'||mode==='config-if'){
    handleConfig(cmd,c,tok); return;
  }

  // show commands (user & priv)
  if(tok[0]==='show'||tok[0]==='sh'){
    const sub = c.replace(/^sh(ow)?\s+/,'');
    if(sub.startsWith('version')||sub==='ver'){ out(SHOW_VER.replace('__HOST__',hostname)); return; }
    if(sub.startsWith('ip int')){ out(SHOW_IP_INT_BRIEF); return; }
    if(sub.startsWith('vlan')){ out(SHOW_VLAN); return; }
    if(sub.startsWith('mac')){ out(SHOW_MAC); return; }
    if(sub.startsWith('int') && sub.includes('status')){ out(SHOW_INT_STATUS); return; }
    if(sub.match(/^int\w*\s+(gi|gig|g0|te|ten|f0|fa)/)){ out(SHOW_INT_GI1); return; }
    if(sub.startsWith('int')){ out(SHOW_INT_STATUS); return; }
    if(sub.startsWith('cdp')){ out(SHOW_CDP); return; }
    if(sub.startsWith('span')){ out(SHOW_SPANNING); return; }
    if(sub.startsWith('proc')){ out(SHOW_PROC_CPU); return; }
    if(sub.startsWith('arp')){ out(SHOW_ARP); return; }
    if(sub.startsWith('etherchannel')){ out(SHOW_ETHERCHANNEL); return; }
    if(sub.startsWith('log')){ out(SHOW_LOG); return; }
    if(sub.startsWith('ip dhcp')){ out(SHOW_DHCP); return; }
    if(sub.startsWith('run')||sub.startsWith('start')){
      if(mode!=='priv'){ out('% Invalid input detected (requires enable).','err'); return; }
      out(SHOW_RUN.replace('__HOST__',hostname)); return;
    }
    if(sub.startsWith('clock')){ out(now()); return; }
    out('% Incomplete / unknown show command. Try: show version | show vlan | show ip int brief','err');
    return;
  }

  // ping
  if(tok[0]==='ping'){ doPing(tok[1]||'192.168.1.1', onAsyncDone); return true; }

  // traceroute
  if(tok[0]==='traceroute'||tok[0]==='trace'){ doTrace(tok[1]||'8.8.8.8', onAsyncDone); return true; }

  // write
  if(c==='write'||c==='write memory'||c==='wr'||c==='copy run start'||c==='copy running-config startup-config'){
    if(mode==='priv'){ out('Building configuration...'); setTimeout(()=>out('[OK]','ok'),350); }
    else out('% Requires privileged mode (enable).','err');
    return;
  }
  if(c==='reload'){ out('% Reload denied — this is a viewing simulator. Nice try. :)','amber'); return; }

  out('% Invalid input detected at \'^\' marker.','err');
}

function handleConfig(cmd,c,tok){
  if(tok[0]==='hostname' && tok[1]){
    hostname = cmd.split(/\s+/)[1];
    refreshPrompt(); return;
  }
  if(tok[0]==='interface'||tok[0]==='int'){
    curIf = cmd.split(/\s+/).slice(1).join(' ')||'Gi0/1';
    mode='config-if'; refreshPrompt(); return;
  }
  if(c.startsWith('ip default-gateway')){ out(''); return; }
  if(c.startsWith('ip dhcp snooping')){ out(''); return; }
  if(tok[0]==='vlan' && tok[1]){ out(''); return; }
  if(c.startsWith('name ')){ out(''); return; }
  if(c.startsWith('description')){ out(''); return; }
  if(c.startsWith('ip address')){ out(''); return; }

  // ---- interface-level (config-if) commands ----
  const If = curIf||'Gi0/1';
  if(c.startsWith('no shut')||c==='no shutdown'){
    out('%LINK-3-UPDOWN: Interface '+If+', changed state to up','gray');
    setTimeout(()=>out('%LINEPROTO-5-UPDOWN: Line protocol on Interface '+If+', changed state to up','gray'),120);
    return;
  }
  if(c==='shutdown'){
    out('%LINK-5-CHANGED: Interface '+If+', changed state to administratively down','gray');
    setTimeout(()=>out('%LINEPROTO-5-UPDOWN: Line protocol on Interface '+If+', changed state to down','gray'),120);
    return;
  }
  if(c.startsWith('switchport')) { out(''); return; }
  if(c.startsWith('speed')||c.startsWith('duplex')){ out(''); return; }
  if(c.startsWith('channel-group')){
    out('Creating a port-channel interface Port-channel 1','gray'); return;
  }
  if(c.startsWith('spanning-tree portfast')){
    out('%Warning: portfast should only be enabled on ports connected to a single','amber');
    out('host. Connecting hubs, switches to this interface when portfast is enabled','amber');
    out('can cause temporary bridging loops. Use with CAUTION','amber');
    return;
  }
  if(c.startsWith('spanning-tree bpduguard')){ out(''); return; }
  if(c.startsWith('storm-control')){ out(''); return; }
  if(c.startsWith('mtu ')||c.startsWith('mls qos')){ out(''); return; }
  if(c.startsWith('power inline')){ out(''); return; }
  if(c.startsWith('load-interval')){ out(''); return; }
  if(c.startsWith('ip dhcp snooping')){ out(''); return; }
  if(c.startsWith('spanning-tree')){ out(''); return; }
  out('% configured.','gray');
}

function doPing(target,done){
  out('Type escape sequence to abort.');
  out('Sending 5, 100-byte ICMP Echos to '+target+', timeout is 2 seconds:');
  const reachable = !/^(10\.99|0\.0|255)/.test(target);
  let line='';
  let i=0;
  busy=true;
  const t=setInterval(()=>{
    line += reachable ? '!' : '.';
    i++;
    if(i>=5){
      clearInterval(t);
      out(line);
      if(reachable){
        out('Success rate is 100 percent (5/5), round-trip min/avg/max = 1/2/4 ms','ok');
      }else{
        out('Success rate is 0 percent (0/5)','err');
      }
      busy=false;
      if(done) done();
    }
  },180);
}

function doTrace(target,done){
  out('Type escape sequence to abort.');
  out('Tracing the route to '+target);
  out('');
  const hops = [
    '192.168.1.1','10.21.4.1','203.0.113.9','72.14.236.18',target
  ];
  let h=0;
  busy=true;
  const t=setInterval(()=>{
    const a=(Math.random()*6+1).toFixed(0);
    const b=(Math.random()*8+2).toFixed(0);
    const cc=(Math.random()*10+3).toFixed(0);
    out('  '+(h+1)+'  '+hops[h]+'  '+a+' msec  '+b+' msec  '+cc+' msec');
    h++;
    if(h>=hops.length){
      clearInterval(t);
      busy=false;
      if(done) done();
    }
  },420);
}

function now(){
  const d=new Date();
  return '*'+d.toTimeString().slice(0,8)+'.000 UTC '+d.toDateString();
}

/* ---- input wiring ---- */
inp.addEventListener('focus',()=>cursor.style.display='inline-block');
inp.addEventListener('blur',()=>cursor.style.display='inline-block');

let onAsyncDone = null;   // called by async commands (ping) when finished

function submit(){
  if(busy) return;
  const v = inp.value;
  inp.value='';
  handle(v);
}
document.getElementById('enter').addEventListener('click',()=>{ stopAuto(); submit(); });
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); stopAuto(); submit(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(hIdx<history.length-1){hIdx++; inp.value=history[hIdx];} }
  else if(e.key==='ArrowDown'){ e.preventDefault(); if(hIdx>0){hIdx--; inp.value=history[hIdx];} else {hIdx=-1; inp.value='';} }
});
screen.addEventListener('click',()=>inp.focus());
document.getElementById('inputline').addEventListener('click',()=>inp.focus());

/* quick chips — tapping one pauses autoplay and runs that command */
const CHIPS = [
  ['▶/⏸','__TOGGLE__'],
  ['enable','enable'],
  ['show version','show version'],
  ['show ip int brief','show ip int brief'],
  ['int status','show interface status'],
  ['show vlan','show vlan'],
  ['mac table','show mac address-table'],
  ['cdp neighbors','show cdp neighbors'],
  ['spanning-tree','show spanning-tree'],
  ['conf t','configure terminal'],
  ['show run','show running-config'],
  ['ping','ping 192.168.1.1'],
  ['?','?'],
];
CHIPS.forEach(([label,cmd])=>{
  const b=document.createElement('button');
  b.className='chip'; b.textContent=label;
  if(cmd==='__TOGGLE__'){
    b.id='toggleChip';
    b.addEventListener('click',()=>{ auto ? stopAuto() : startAuto(); });
  }else{
    b.addEventListener('click',()=>{ stopAuto(); inp.value=cmd; inp.focus(); submit(); });
  }
  chipsBar.appendChild(b);
});

/* =========================================================
   AUTO-PLAY ENGINE — types random commands like a human
   ========================================================= */
let auto = false;
let autoTimers = [];
function aTimeout(fn,ms){ const id=setTimeout(fn,ms); autoTimers.push(id); return id; }
function clearAutoTimers(){ autoTimers.forEach(clearTimeout); autoTimers=[]; }

const toggleChip = ()=>document.getElementById('toggleChip');

/* command pools per mode, so the random walk stays realistic */
const POOL_USER = [
  'enable','show version','show ip int brief','show interface status',
  'show vlan','show mac address-table','show cdp neighbors',
  'show arp','show interface gi0/1','ping 192.168.1.1','ping 8.8.8.8',
  'show clock','?'
];
const POOL_PRIV = [
  'show running-config','show ip int brief','show interface status',
  'show vlan','show mac address-table','show cdp neighbors',
  'show spanning-tree','show arp','show processes cpu','show logging',
  'show etherchannel summary','show ip dhcp binding','show interface gi0/1',
  'ping 192.168.1.1','ping 10.99.0.1','traceroute 8.8.8.8',
  'configure terminal','show version','show clock','write memory'
];
const POOL_CONFIG = [
  'hostname CORE-SW1','interface gi0/1','interface gi0/5','interface te0/1',
  'interface range gi0/1 - 4','vlan 30','vlan 40','spanning-tree mode rapid-pvst',
  'ip default-gateway 192.168.1.1','exit'
];
const POOL_CONFIF = [
  'description uplink-to-core','switchport mode access','switchport access vlan 10',
  'switchport mode trunk','switchport trunk allowed vlan 10,20,99',
  'switchport trunk native vlan 99','switchport voice vlan 150',
  'speed 1000','duplex full','spanning-tree portfast',
  'spanning-tree bpduguard enable','storm-control broadcast level 20.00',
  'channel-group 1 mode active','no shutdown','shutdown',
  'mtu 9000','power inline auto','load-interval 30',
  'ip dhcp snooping limit rate 15','exit'
];

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
let stepsInMode = 0;   // gently force returns toward user mode over time

function nextCommand(){
  // bias: after wandering deep, sometimes climb back out
  if(mode==='config-if'){ stepsInMode++; if(stepsInMode>4 && Math.random()<0.5) return 'exit'; return pick(POOL_CONFIF); }
  if(mode==='config'){ stepsInMode++; if(stepsInMode>3 && Math.random()<0.45) return 'exit'; return pick(POOL_CONFIG); }
  if(mode==='priv'){ return pick(POOL_PRIV); }
  return pick(POOL_USER);
}

function typeCommand(cmd, done){
  inp.value='';
  let i=0;
  function step(){
    if(!auto) return;
    inp.value = cmd.slice(0,i);
    screen.scrollTop = screen.scrollHeight;
    i++;
    if(i<=cmd.length){
      aTimeout(step, 38 + Math.random()*70);   // human-ish keystroke jitter
    }else{
      aTimeout(done, 360 + Math.random()*500);  // pause before Enter
    }
  }
  step();
}

function autoLoop(){
  if(!auto) return;
  const cmd = nextCommand();
  if(mode==='user'||mode==='priv') stepsInMode=0;
  typeCommand(cmd, ()=>{
    if(!auto) return;
    const v = inp.value;
    inp.value='';
    onAsyncDone = ()=>{ onAsyncDone=null; if(auto) aTimeout(autoLoop, 900 + Math.random()*900); };
    const isAsync = handle(v);   // returns true if it scheduled async output (ping)
    if(!isAsync){
      onAsyncDone = null;
      aTimeout(autoLoop, 900 + Math.random()*1100);  // dwell so viewer can read output
    }
  });
}

function startAuto(){
  if(auto || busy) { if(busy){ /* retry shortly */ setTimeout(startAuto,300);} return; }
  auto = true;
  inp.blur();
  const t=toggleChip(); if(t){ t.textContent='⏸ 일시정지'; t.style.color='var(--amber)'; t.style.borderColor='var(--dim)'; }
  aTimeout(autoLoop, 500);
}
function stopAuto(){
  if(!auto) return;
  auto = false;
  clearAutoTimers();
  onAsyncDone = null;
  inp.value='';
  const t=toggleChip(); if(t){ t.textContent='▶ 자동재생'; t.style.color=''; t.style.borderColor=''; }
}

    busy=false;
    aTimeout(startAuto, 700);   // kick off auto-play after boot
  }
})();
