const $=id=>document.getElementById(id),LIMIT=15,COUNT=10;let round=[],index=0,score=0,combo=0,correct=0,time=LIMIT,timer=null,answered=false,soundOn=true;
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function tone(ok){if(!soundOn)return;try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.type=ok?'square':'sawtooth';o.frequency.setValueAtTime(ok?540:170,c.currentTime);o.frequency.exponentialRampToValueAtTime(ok?820:95,c.currentTime+.12);g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.16);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.16)}catch(e){}}
function makeRound(){const reads=[...new Set(QUESTIONS.map(q=>q.reading))];return shuffle(QUESTIONS).slice(0,COUNT).map(q=>({...q,options:shuffle([q.reading,...shuffle(reads.filter(r=>r!==q.reading)).slice(0,3)])}))}
function start(){round=makeRound();index=score=combo=correct=0;show('quiz');render()}
function show(id){['start','quiz','result'].forEach(x=>$(x).classList.toggle('hidden',x!==id))}
function render(){clearInterval(timer);answered=false;time=LIMIT;const q=round[index];$('num').textContent=String(index+1).padStart(2,'0');$('score').textContent=String(score).padStart(5,'0');$('combo').textContent=String(combo).padStart(2,'0');$('bar').style.width=(index/COUNT*100)+'%';$('qid').textContent='ID: Lv06_'+String(q.id).padStart(4,'0');$('kanji').textContent=q.kanji;$('kanji').classList.toggle('long',q.kanji.length>5);$('feedback').classList.add('hidden');$('answers').innerHTML='';q.options.forEach((o,i)=>{const b=document.createElement('button');b.className='answer';b.innerHTML='<span class="letter">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span>';b.onclick=()=>answer(o,b);$('answers').appendChild(b)});$('time').textContent=time;timer=setInterval(()=>{time--;$('time').textContent=time;if(time<=0){clearInterval(timer);answer('__timeout__',null)}},1000)}
function answer(value,button){if(answered)return;answered=true;clearInterval(timer);const q=round[index],ok=value===q.reading;[...$('answers').children].forEach(b=>{const text=b.lastElementChild.textContent;b.disabled=true;b.classList.add(text===q.reading?'correct':b===button?'wrong':'muted')});if(ok){const gain=100+combo*25+time*5;score+=gain;combo++;correct++;tone(true);$('feedbackTitle').textContent='正解！ +'+gain+' POINT'}else{combo=0;tone(false);$('feedbackTitle').textContent=value==='__timeout__'?'TIME UP! 正解は「'+q.reading+'」':'残念！ 正解は「'+q.reading+'」'}$('score').textContent=String(score).padStart(5,'0');$('combo').textContent=String(combo).padStart(2,'0');$('bar').style.width=((index+1)/COUNT*100)+'%';$('feedback').className='feedback '+(ok?'':'bad');$('feedbackText').textContent=q.kanji+'【'+q.reading+'】 '+(q.hint==='-'?'· Lv.6 ID '+String(q.id).padStart(4,'0'):'· '+q.hint);$('nextBtn').textContent=index===COUNT-1?'結果を見る ››':'つぎへ ››'}
function next(){if(index<COUNT-1){index++;render()}else finish()}
function finish(){clearInterval(timer);const best=Math.max(Number(localStorage.getItem('kanji500best')||0),score);localStorage.setItem('kanji500best',best);$('best').textContent=String(best).padStart(5,'0');$('resultTitle').textContent=correct>=8?'見事！':correct>=5?'健闘！':'再挑戦！';$('finalScore').textContent=String(score).padStart(5,'0');$('resultText').textContent='正解 '+correct+' / 10　・　正答率 '+(correct*10)+'%';show('result')}
$('startBtn').onclick=start;$('againBtn').onclick=start;$('nextBtn').onclick=next;$('sound').onclick=()=>{soundOn=!soundOn;$('sound').textContent=soundOn?'♪':'×'};$('best').textContent=String(Number(localStorage.getItem('kanji500best')||0)).padStart(5,'0');
