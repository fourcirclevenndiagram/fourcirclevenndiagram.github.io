<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>漢字でGO Lv.6 フラッシュ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --safe-t: env(safe-area-inset-top);
    --safe-b: env(safe-area-inset-bottom);
    --neon: #00e5ff;
    --accent: #ff2d78;
    --gold: #ffcf40;
  }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    height:100dvh;
    background: radial-gradient(circle at 50% 30%, #12203a 0%, #060912 70%);
    color:#e8f0ff;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    display:flex; flex-direction:column;
    padding: calc(var(--safe-t) + 8px) 14px calc(var(--safe-b) + 8px);
    user-select:none; -webkit-user-select:none;
  }
  /* top bar */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    font-size:12px; letter-spacing:1px; color:#6b83a8;
    flex-shrink:0;
  }
  .topbar .title { color:var(--neon); font-weight:700; text-shadow:0 0 8px rgba(0,229,255,.5); }
  .count { font-variant-numeric:tabular-nums; }
  /* progress bar */
  .progress-wrap { height:3px; background:#1a2740; border-radius:3px; margin-top:8px; overflow:hidden; flex-shrink:0; }
  .progress { height:100%; width:0%; background:linear-gradient(90deg,var(--neon),var(--accent)); transition:width .1s linear; }
  /* main card */
  .stage {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; min-height:0;
  }
  .kanji {
    font-size: clamp(56px, 22vw, 150px);
    font-weight:700; line-height:1.1; text-align:center;
    text-shadow: 0 0 24px rgba(0,229,255,.35);
    word-break:break-all; padding:0 4px;
    transition: transform .3s ease;
  }
  .reveal {
    margin-top:20px; width:100%; max-width:520px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    opacity:0; transform:translateY(14px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .reveal.show { opacity:1; transform:translateY(0); }
  .yomi {
    font-size: clamp(24px, 8vw, 40px); font-weight:700; color:var(--gold);
    text-align:center; text-shadow:0 0 14px rgba(255,207,64,.4);
  }
  .yomi-alt { font-size:14px; color:#9fb3d4; margin-top:-6px; }
  .divider { width:44px; height:2px; background:#2a3c5c; border-radius:2px; }
  .imi {
    font-size: clamp(15px, 4.4vw, 19px); line-height:1.6; color:#cdddf5;
    text-align:center; padding:0 6px;
    opacity:0; transform:translateY(10px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .imi.show { opacity:1; transform:translateY(0); }
  .alt {
    font-size:14px; color:#7f9ec4; margin-top:4px; text-align:center;
    opacity:0; transition:opacity .35s ease;
  }
  .alt.show { opacity:1; }
  .alt b { color:var(--accent); font-weight:600; }
  /* phase pips */
  .pips { display:flex; gap:6px; margin-top:2px; }
  .pip { width:8px; height:8px; border-radius:50%; background:#243450; transition:background .2s, box-shadow .2s; }
  .pip.on { background:var(--neon); box-shadow:0 0 8px var(--neon); }
  /* controls */
  .controls { display:flex; align-items:center; justify-content:center; gap:12px; flex-shrink:0; padding-top:6px; }
  button {
    background:#132038; color:#cfe3ff; border:1px solid #22345a;
    border-radius:14px; padding:12px 18px; font-size:15px; font-weight:600;
    display:flex; align-items:center; gap:7px; cursor:pointer;
    transition:transform .1s, background .2s;
  }
  button:active { transform:scale(.94); }
  button.primary { background:var(--neon); color:#04121f; border-color:var(--neon); box-shadow:0 0 16px rgba(0,229,255,.4); min-width:120px; justify-content:center; }
  button.primary.paused { background:var(--accent); border-color:var(--accent); box-shadow:0 0 16px rgba(255,45,120,.4); color:#fff; }
  .icon { font-size:16px; }
  .paused-badge {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    font-size:12px; letter-spacing:2px; color:var(--accent);
    border:1px solid var(--accent); border-radius:20px; padding:4px 12px;
    background:rgba(255,45,120,.08); opacity:0; transition:opacity .2s;
  }
  .paused-badge.show { opacity:1; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="title">漢字でGO Lv.6</span>

  <div class="progress-wrap"><div class="progress" id="prog"></div></div>

      <div class="divider"></div>

      <div class="alt" id="alt"></div>

    <div class="pip" id="pip1"></div>
    <div class="pip" id="pip2"></div>
  </div>

  <div class="controls">

    <button class="primary" id="playBtn"><span class="icon">❚❚</span><span id="playLabel">一時停止</span></button>
    <button id="nextBtn"><span class="icon">⏭</span></button>
  </div>

: "団扇仙人掌", "yomialt": ""}, {"id": "0483", "yomi": "ぼたんはなさく", "kanji": "牡丹華", "imi": "七十二候のひとつ。４月３０日から５月４日ごろ。", "alt": "", "yomialt": ""}, {"id": "0484", "yomi": "ふかききりまとう", "kanji": "蒙霧升降", "imi": "七十二候のひとつ。８月１８日から８月２２日ごろ。", "alt": "", "yomialt": ""}, {"id": "0485", "yomi": "ももはじめてさく", "kanji": "桃始笑", "imi": "七十二候のひとつ。３月１１日から３月１５日ごろ。", "alt": "", "yomialt": ""}, {"id": "0486", "yomi": "そうじねん", "kanji": "桒字年", "imi": "４８歳の人のこと。『桑年』とも。", "alt": "", "yomialt": ""}, {"id": "0487", "yomi": "ふりつづみ", "kanji": "鼗", "imi": "小さな玉を二つずつうり下げ、柄を振ると音が鳴る小さな太鼓。", "alt": "鞀、鞉", "yomialt": ""}, {"id": "0488", "yomi": "くしび", "kanji": "霊び", "imi": "不思議なこと。霊妙なこと。", "alt": "奇び", "yomialt": ""}, {"id": "0489", "yomi": "きたいもの", "kanji": "腊物", "imi": "魚や鳥の丸干しのこと。", "alt": "腒物", "yomialt": ""}, {"id": "0490", "yomi": "みだぬき", "kanji": "貒狸", "imi": "イタチ目イタチ科の動物。アナグマの別名。", "alt": "", "yomialt": ""}, {"id": "0491", "yomi": "よほろすじ、よおろすじ、よぼろすじ", "kanji": "膕筋", "imi": "ひざの裏側にある大きな筋肉。", "alt": "", "yomialt": ""}, {"id": "0492", "yomi": "ろうとえきす", "kanji": "莨菪エキス", "imi": "ハシリドコロから抽出したアルカロイドを含んだエキス。鎮痛剤、鎮痙剤に使用する。", "alt": "", "yomialt": ""}, {"id": "0493", "yomi": "やんぬるかな", "kanji": "已矣哉", "imi": "絶望、慨嘆をあらわす語。もう今となってはどうにもしかたがない。", "alt": "已矣乎、已矣", "yomialt": ""}, {"id": "0494", "yomi": "まぐさしきこうぞう", "kanji": "楣式構造", "imi": "垂直な支柱と、それに支えられた横木を基本とする建築構造。", "alt": "", "yomialt": ""}, {"id": "0495", "yomi": "どぶかっちり", "kanji": "丼礑", "imi": "狂言、座頭が師を背負い川を渡ろうとすると通行人が代わりに背負われ、悪戯をする。", "alt": "", "yomialt": ""}, {"id": "0496", "yomi": "ゆするつき、ゆすりつき、ゆずりづき", "kanji": "泔坏", "imi": "頭髪を洗うために用いる器。", "alt": "", "yomialt": ""}, {"id": "0497", "yomi": "としょかん", "kanji": "圕", "imi": "図書や記録を集め、公衆に閲覧させる施設。『図』『書』『館』を簡略化して表した語。", "alt": "", "yomialt": ""}, {"id": "0498", "yomi": "ちきりこうぶり", "kanji": "幗", "imi": "かぶりものの一種。頭巾の類。特に、老婦人が喪中にかぶったかぶりもの。", "alt": "", "yomialt": ""}, {"id": "0499", "yomi": "ろくどく", "kanji": "磟碡", "imi": "田畑の土をならして使う、石製でローラーの形状をした農具。", "alt": "", "yomialt": ""}, {"id": "0500", "yomi": "れいよう", "kanji": "麢羊", "imi": "ウシ科の大部分の種を含む動物の総称。『アンテロープ』とも。", "alt": "", "yomialt": ""}];

// phase durations (ms)
const T_KANJI = 3000, T_YOMI = 2000, T_IMI = 2000;

const el = {
  kanji: document.getElementById('kanji'),
  reveal: document.getElementById('reveal'),
  yomi: document.getElementById('yomi'),
  yomiAlt: document.getElementById('yomiAlt'),
  imi: document.getElementById('imi'),
  alt: document.getElementById('alt'),
  count: document.getElementById('count'),
  prog: document.getElementById('prog'),
  playBtn: document.getElementById('playBtn'),
  playLabel: document.getElementById('playLabel'),
  pausedBadge: document.getElementById('pausedBadge'),
  pips: [document.getElementById('pip0'),document.getElementById('pip1'),document.getElementById('pip2')],
};

let order = [];      // shuffled indices
let pos = 0;         // position in order
let phase = 0;       // 0=kanji only, 1=+yomi, 2=+imi
let paused = false;
let phaseStart = 0;
let elapsedInPhase = 0;
let rafId = null;

function shuffle(n){
  const a = [...Array(n).keys()];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function currentItem(){ return DATA[order[pos]]; }

function renderItem(){
  const it = currentItem();
  el.kanji.textContent = it.kanji;
  el.yomi.textContent = it.yomi;
  el.yomiAlt.textContent = it.yomialt ? '別読み：' + it.yomialt : '';
  el.yomiAlt.style.display = it.yomialt ? 'block':'none';
  el.imi.textContent = it.imi;
  if(it.alt){
    el.alt.innerHTML = '<b>別表記</b>　' + it.alt;
    el.alt.style.display = 'block';
  } else {
    el.alt.textContent = '';
    el.alt.style.display = 'none';
  }
  el.count.textContent = 'No.' + it.id + '　' + (pos+1) + ' / ' + order.length;
}

function applyPhase(){
  // phase 0: hide reveal; 1: show yomi; 2: show imi+alt
  if(phase===0){
    el.reveal.classList.remove('show');
    el.imi.classList.remove('show');
    el.alt.classList.remove('show');
  } else if(phase===1){
    el.reveal.classList.add('show');
    el.imi.classList.remove('show');
    el.alt.classList.remove('show');
  } else {
    el.reveal.classList.add('show');
    el.imi.classList.add('show');
    el.alt.classList.add('show');
  }
  el.pips.forEach((p,i)=> p.classList.toggle('on', i<=phase));
}

function phaseDuration(){ return phase===0?T_KANJI : phase===1?T_YOMI : T_IMI; }

function startPhase(reset=true){
  if(reset) elapsedInPhase = 0;
  phaseStart = performance.now() - elapsedInPhase;
  applyPhase();
}

function nextPhase(){
  phase++;
  if(phase>2){
    phase = 0;
    pos++;
    if(pos>=order.length){
      order = shuffle(DATA.length); // reshuffle for endless random
      pos = 0;
    }
    renderItem();
  }
  startPhase(true);
}

function goNextItem(){
  phase = 0; pos++;
  if(pos>=order.length){ order = shuffle(DATA.length); pos=0; }
  renderItem(); startPhase(true);
}
function goPrevItem(){
  phase = 0; pos--;
  if(pos<0){ pos = order.length-1; }
  renderItem(); startPhase(true);
}

function loop(now){
  if(!paused){
    elapsedInPhase = now - phaseStart;
    const dur = phaseDuration();
    const frac = Math.min(elapsedInPhase/dur, 1);
    el.prog.style.width = (frac*100)+'%';
    if(elapsedInPhase >= dur){
      nextPhase();
    }
  }
  rafId = requestAnimationFrame(loop);
}

function setPaused(p){
  paused = p;
  if(paused){
    elapsedInPhase = performance.now() - phaseStart; // freeze
    el.playLabel.textContent = '再生';
    el.playBtn.querySelector('.icon').textContent = '▶';
    el.playBtn.classList.add('paused');
    el.pausedBadge.classList.add('show');
  } else {
    phaseStart = performance.now() - elapsedInPhase; // resume
    el.playLabel.textContent = '一時停止';
    el.playBtn.querySelector('.icon').textContent = '❚❚';
    el.playBtn.classList.remove('paused');
    el.pausedBadge.classList.remove('show');
  }
}

el.playBtn.addEventListener('click', ()=> setPaused(!paused));
document.getElementById('nextBtn').addEventListener('click', goNextItem);
document.getElementById('prevBtn').addEventListener('click', goPrevItem);
// tap on kanji area also advances phase manually
document.getElementById('stage').addEventListener('click', (e)=>{
  if(paused) return;
  // manual skip to next phase on tap
  nextPhase();
});

// auto-pause when tab hidden
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden && !paused) setPaused(true);
});

// init
order = shuffle(DATA.length);
renderItem();
startPhase(true);
rafId = requestAnimationFrame(loop);
</script>
