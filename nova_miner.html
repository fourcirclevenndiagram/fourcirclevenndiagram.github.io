<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NOVA RIG · 노바 채굴</title>
<style>
  :root{
    --bg:#06080d;--panel:#0d1119;--panel2:#11161f;--line:#1c2433;
    --gold:#f7931a;--gold-soft:#ffb84d;--green:#2ecc71;--green-dim:#1a7a45;
    --cyan:#3dd6e0;--purple:#b07cff;
    --txt:#e6ebf2;--txt-dim:#7c8696;--red:#ff5252;
    --mono:'SF Mono',ui-monospace,'Roboto Mono','Courier New',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);
    display:flex;justify-content:center;user-select:none;-webkit-user-select:none;}
  #app{width:100%;max-width:440px;height:100dvh;display:flex;flex-direction:column;
    background:radial-gradient(circle at 50% -10%, rgba(247,147,26,0.10), transparent 55%),var(--bg);
    position:relative;overflow:hidden;}

  header{padding:12px 18px 9px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:8px;}
  .coin{width:26px;height:26px;border-radius:50%;
    background:linear-gradient(145deg,var(--gold-soft),var(--gold));
    display:flex;align-items:center;justify-content:center;color:#3a1f00;font-weight:800;font-size:15px;
    box-shadow:0 0 14px rgba(247,147,26,0.5);}
  .logo b{font-size:14px;letter-spacing:1px;}
  .logo small{display:block;font-size:8px;color:var(--txt-dim);letter-spacing:2px;}
  .net{font-size:9px;color:var(--green);display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .net .on{display:flex;align-items:center;gap:5px;}
  .net .dot{width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:pulse 1.6s infinite;}
  .net .era{color:var(--purple);font-size:8px;letter-spacing:1px;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .balance{padding:14px 18px 11px;text-align:center;border-bottom:1px solid var(--line);}
  .balance .label{font-size:9px;color:var(--txt-dim);letter-spacing:3px;}
  .balance .amt{font-size:31px;font-weight:800;margin-top:3px;color:var(--gold-soft);
    text-shadow:0 0 22px rgba(247,147,26,0.35);font-variant-numeric:tabular-nums;}
  .balance .amt .unit{font-size:13px;color:var(--gold);margin-left:4px;}
  .balance .rate{font-size:10px;color:var(--txt-dim);margin-top:3px;}
  .balance .rate b{color:var(--green);}

  .hashdisp{background:#04060a;border-bottom:1px solid var(--line);
    padding:7px 14px 8px;position:relative;overflow:hidden;}
  .hashdisp .target{font-size:7.5px;color:var(--txt-dim);letter-spacing:1.5px;
    display:flex;justify-content:space-between;margin-bottom:4px;}
  .hashdisp .target b{color:var(--gold);}
  #hashStream{font-size:11px;line-height:1.45;letter-spacing:0.5px;color:var(--green-dim);
    word-break:break-all;height:32px;overflow:hidden;font-variant-numeric:tabular-nums;}
  #hashStream .cur{color:var(--green);}
  #hashStream .zero{color:var(--gold-soft);font-weight:700;text-shadow:0 0 6px rgba(247,147,26,0.6);}
  #hashStream.win .cur{color:#fff;text-shadow:0 0 8px var(--gold);}
  .hashdisp .sweep{position:absolute;left:0;top:0;bottom:0;width:34%;
    background:linear-gradient(90deg,transparent,rgba(46,204,113,0.06),transparent);
    animation:scan 1.4s linear infinite;pointer-events:none;}
  @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(450%)}}

  .diff{padding:8px 14px;border-bottom:1px solid var(--line);}
  .diff .row{display:flex;justify-content:space-between;font-size:8px;color:var(--txt-dim);
    letter-spacing:1.5px;margin-bottom:4px;}
  .diff .row b{color:var(--cyan);}
  .diffbar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
  .diffbar i{display:block;height:100%;width:0%;border-radius:3px;
    background:linear-gradient(90deg,var(--green),var(--gold),var(--red));transition:width .4s;}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;
    background:var(--line);border-bottom:1px solid var(--line);}
  .stat{background:var(--panel);padding:8px 10px;}
  .stat .k{font-size:7.5px;color:var(--txt-dim);letter-spacing:1.5px;}
  .stat .v{font-size:13px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;}
  .stat .v.gold{color:var(--gold-soft);}.stat .v.green{color:var(--green);}.stat .v.cyan{color:var(--cyan);}

  .logwrap{flex:1;min-height:0;padding:8px 14px 6px;overflow:hidden;display:flex;flex-direction:column;}
  .log-title{font-size:8px;color:var(--txt-dim);letter-spacing:2px;margin-bottom:5px;
    display:flex;justify-content:space-between;}
  #log{flex:1;overflow-y:auto;font-size:10.5px;line-height:1.65;
    display:flex;flex-direction:column-reverse;scrollbar-width:none;}
  #log::-webkit-scrollbar{display:none;}
  .line{opacity:0;animation:fadein .35s forwards;border-left:2px solid transparent;padding-left:8px;}
  @keyframes fadein{to{opacity:1}}
  .line.auto{color:var(--txt-dim);border-color:var(--line);}
  .line.hit{color:var(--gold-soft);border-color:var(--gold);}
  .line.jackpot{color:#fff;border-color:var(--gold);
    background:linear-gradient(90deg,rgba(247,147,26,0.18),transparent);
    font-weight:700;text-shadow:0 0 10px rgba(247,147,26,0.6);}
  .line.boom{color:var(--red);border-color:var(--red);}
  .line.up{color:var(--green);border-color:var(--green-dim);}
  .line.event{color:var(--purple);border-color:var(--purple);
    background:linear-gradient(90deg,rgba(176,124,255,0.12),transparent);}
  .line.halving{color:var(--cyan);border-color:var(--cyan);
    background:linear-gradient(90deg,rgba(61,214,224,0.14),transparent);font-weight:700;}
  .line .t{color:#4a5366;margin-right:6px;}

  .gears{padding:6px 14px 8px;border-top:1px solid var(--line);}
  .gears .ghead{font-size:8px;color:var(--txt-dim);letter-spacing:2px;margin-bottom:6px;
    display:flex;justify-content:space-between;}
  .gears .ghead b{color:var(--gold-soft);}
  .gridg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .gear{background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    padding:7px 8px;font-size:9px;text-align:center;transition:.25s;position:relative;overflow:hidden;}
  .gear.ready{border-color:var(--gold);box-shadow:0 0 12px rgba(247,147,26,0.15);}
  .gear.maxed{border-color:var(--green-dim);opacity:.85;}
  .gear .ic{font-size:16px;}
  .gear .nm{font-weight:700;color:var(--txt);margin-top:1px;}
  .gear .lvl{color:var(--cyan);font-size:8px;}
  .gear .cost{color:var(--txt-dim);font-size:8px;margin-top:2px;}
  .gear.ready .cost{color:var(--gold-soft);}

  .btnwrap{padding:7px 18px calc(16px + env(safe-area-inset-bottom));}
  #hashBtn{width:100%;border:none;border-radius:16px;padding:17px;font-family:var(--mono);
    font-size:15px;font-weight:800;letter-spacing:1px;color:#2a1700;cursor:pointer;position:relative;
    background:linear-gradient(145deg,var(--gold-soft),var(--gold));
    box-shadow:0 6px 0 #b86a0c,0 10px 28px rgba(247,147,26,0.4);
    transition:transform .05s,box-shadow .05s;overflow:hidden;}
  #hashBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #b86a0c,0 4px 14px rgba(247,147,26,0.3);}
  #hashBtn .sub{display:block;font-size:9px;font-weight:600;color:#5a3500;letter-spacing:2px;margin-top:3px;}
  #cool{position:absolute;left:0;top:0;bottom:0;width:0%;background:rgba(0,0,0,0.28);pointer-events:none;}

  .float{position:absolute;font-weight:800;font-size:16px;pointer-events:none;
    animation:floatup 1s ease-out forwards;z-index:50;text-shadow:0 0 8px rgba(0,0,0,.5);}
  @keyframes floatup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-46px)}}

  #flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:40;}
  #flash.on{animation:flash .6s ease-out;}
  @keyframes flash{0%{opacity:.5}100%{opacity:0}}
</style>
</head>
<body>
<div id="app">
  <div id="flash"></div>
  <header>
    <div class="logo">
      <div class="coin">₿</div>
      <div><b>NOVA RIG</b><small>SOLO MINING NODE</small></div>
    </div>
    <div class="net">
      <span class="on"><span class="dot"></span>NODE ONLINE</span>
      <span class="era" id="era">ERA 1 · 6.25 NVX/blk</span>
    </div>
  </header>

  <div class="balance">
    <div class="label">WALLET BALANCE</div>
    <div class="amt"><span id="bal">0.00000000</span><span class="unit">NVX</span></div>
    <div class="rate">자동 채굴 <b id="rate">+0.00000010</b> NVX/s</div>
  </div>

  <div class="hashdisp">
    <div class="target"><span>SHA-256 NONCE SEARCH</span><span>TARGET <b id="tgt">0000····</b></span></div>
    <div id="hashStream"></div>
    <div class="sweep"></div>
  </div>

  <div class="diff">
    <div class="row"><span>NETWORK DIFFICULTY</span><span>NEXT BLOCK <b id="diffpct">0%</b></span></div>
    <div class="diffbar"><i id="diffbar"></i></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="k">HASHRATE</div><div class="v green" id="hr">12 TH/s</div></div>
    <div class="stat"><div class="k">BLOCKS</div><div class="v cyan" id="blocks">0</div></div>
    <div class="stat"><div class="k">LUCKY HITS</div><div class="v gold" id="hits">0</div></div>
  </div>

  <div class="logwrap">
    <div class="log-title"><span>MINING LOG</span><span id="uptime">UPTIME 00:00</span></div>
    <div id="log"></div>
  </div>

  <div class="gears">
    <div class="ghead"><span>AUTO-INVEST RIG</span><span>잔액으로 자동 구매 · <b id="autostat">대기</b></span></div>
    <div class="gridg" id="gears"></div>
  </div>

  <div class="btnwrap">
    <button id="hashBtn">⛏ 해시 펀치 (HASH PUNCH)
      <span class="sub">탭해서 채굴 시도 · 낮은 확률로 블록 발견</span>
      <div id="cool"></div>
    </button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const fmt=n=>n.toFixed(8);

  const HEX="0123456789abcdef";
  function randHash(z){let h="";z=z||0;for(let i=0;i<64;i++)h+=(i<z?"0":HEX[(Math.random()*16)|0]);return h;}
  function colorHash(h){let z=0;while(h[z]==="0")z++;let o="";
    for(let i=0;i<h.length;i++)o+=(i<z?'<span class="zero">'+h[i]+'</span>':h[i]);return o;}
  const streamEl=$("hashStream");let hashTimer=null;
  function spinHash(){let z=0;const r=Math.random();
    if(r<0.015)z=3;else if(r<0.06)z=2;else if(r<0.18)z=1;
    streamEl.innerHTML='<span class="cur">'+colorHash(randHash(z))+'</span>';}
  function startHashLoop(){if(!hashTimer)hashTimer=setInterval(spinHash,90);}
  function showWinHash(z){clearInterval(hashTimer);hashTimer=null;
    streamEl.classList.add("win");streamEl.innerHTML='<span class="cur">'+colorHash(randHash(z))+'</span>';
    setTimeout(()=>{streamEl.classList.remove("win");startHashLoop();},900);}

  const GEARS=[
    {id:"asic", ic:"🖥️", nm:"ASIC", base:0.0008, mult:1.9, eff:"해시×1.6", max:50},
    {id:"cool", ic:"❄️", nm:"쿨러", base:0.0012, mult:2.0, eff:"펀치×1.4", max:40},
    {id:"power",ic:"⚡", nm:"전력", base:0.0020, mult:2.1, eff:"자동×1.5", max:40}
  ];

  const SAVE="satoshi_rig_v2";
  let s={bal:0, blocks:0, hits:0, started:Date.now(), lastTick:Date.now(),
    diffProg:0, asic:0, cool:0, power:0, eventMult:1, eventUntil:0, eventName:""};
  try{const d=JSON.parse(localStorage.getItem(SAVE));if(d)s=Object.assign(s,d);}catch(e){}

  function era(){return Math.floor(s.blocks/30);}
  function blockReward(){return 6.25/Math.pow(2,era());}
  function rewardScale(){return 0.00000060*blockReward()/6.25;}
  function difficulty(){return 1+s.blocks*0.12;}
  function targetZeros(){return Math.min(8,4+Math.floor(s.blocks/8));}
  function hashrate(){return Math.round(12*Math.pow(1.6,s.asic));}
  function autoRate(){return 0.00000010*Math.pow(1.5,s.power)*Math.pow(1.6,s.asic)*s.eventMult;}
  function punchBase(){return 0.00000005*Math.pow(1.4,s.cool)*Math.pow(1.6,s.asic)*s.eventMult;}
  function gearDef(g){return GEARS.find(x=>x.id===g);}
  function gearCost(g){return gearDef(g).base*Math.pow(gearDef(g).mult,s[g]);}

  const logEl=$("log");
  function clock(){const d=new Date();return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2)+":"+("0"+d.getSeconds()).slice(-2);}
  function log(html,cls){const div=document.createElement("div");div.className="line "+(cls||"auto");
    div.innerHTML='<span class="t">'+clock()+'</span>'+html;logEl.prepend(div);
    while(logEl.children.length>45)logEl.removeChild(logEl.lastChild);}
  function floatNum(t,c,x,y){const f=document.createElement("div");f.className="float";f.textContent=t;
    f.style.color=c;f.style.left=(x||50)+"%";f.style.top=(y||55)+"%";$("app").appendChild(f);
    setTimeout(()=>f.remove(),1000);}
  function flash(color){const fl=$("flash");fl.style.background=
    "radial-gradient(circle at 50% 40%,"+color+",transparent 70%)";
    fl.classList.remove("on");void fl.offsetWidth;fl.classList.add("on");}

  function findBlock(big){const reward=rewardScale()*(big?70:1)*difficulty();
    s.bal+=reward;s.blocks++;showWinHash(targetZeros()+(big?2:0));return reward;}

  const gearsEl=$("gears");
  function renderGears(){gearsEl.innerHTML="";
    GEARS.forEach(g=>{const lvl=s[g.id],maxed=lvl>=g.max,cost=gearCost(g.id),ready=!maxed&&s.bal>=cost;
      const d=document.createElement("div");
      d.className="gear"+(maxed?" maxed":ready?" ready":"");
      d.innerHTML='<div class="ic">'+g.ic+'</div><div class="nm">'+g.nm+
        '</div><div class="lvl">Lv.'+lvl+(maxed?" MAX":"")+'</div>'+
        '<div class="cost">'+(maxed?g.eff:fmt(cost)+' NVX')+'</div>';
      gearsEl.appendChild(d);});}
  function render(){
    $("bal").textContent=fmt(s.bal);
    $("rate").textContent="+"+fmt(autoRate());
    $("hr").textContent=hashrate().toLocaleString()+" TH/s";
    $("blocks").textContent=s.blocks;$("hits").textContent=s.hits;
    $("tgt").textContent="0".repeat(targetZeros())+"····";
    $("era").textContent="ERA "+(era()+1)+" · "+blockReward().toFixed(blockReward()<1?5:2)+" NVX/blk";
    const pct=Math.min(100,Math.round(s.diffProg*100));
    $("diffpct").textContent=pct+"%";$("diffbar").style.width=pct+"%";
    $("autostat").textContent=s.eventUntil>Date.now()?s.eventName:"가동 중";
    renderGears();}

  function autoBuy(){for(const g of GEARS){if(s[g.id]>=g.max)continue;
    const cost=gearCost(g.id);
    if(s.bal>=cost*1.2){s.bal-=cost;s[g.id]++;
      log('🔧 자동 구매: <b>'+g.nm+'</b> Lv.'+s[g.id]+' ('+g.eff+')',"up");
      floatNum("⚙ "+g.nm+" UP","var(--cyan)",50,40);return;}}}

  const EVENTS=[
    {nm:"🐋 고래 매수", mult:2.2, dur:20, col:"rgba(46,204,113,0.4)", msg:"고래 대량 매수 — 채굴 보상 일시 급등!",cls:"event"},
    {nm:"⛏ 채굴 붐",   mult:1.8, dur:18, col:"rgba(247,147,26,0.4)", msg:"채굴 붐! 모든 보상 1.8배",cls:"event"},
    {nm:"⚠ 난이도 폭등",mult:0.6, dur:15, col:"rgba(255,82,82,0.35)", msg:"네트워크 난이도 폭등 — 보상 하락",cls:"boom"},
    {nm:"🔌 정전",     mult:0.4, dur:12, col:"rgba(120,120,140,0.4)", msg:"전력망 정전 — 채굴 효율 급감",cls:"boom"}
  ];
  function maybeEvent(){if(s.eventUntil>Date.now())return;
    if(Math.random()<0.018){const e=EVENTS[Math.floor(Math.random()*EVENTS.length)];
      s.eventMult=e.mult;s.eventUntil=Date.now()+e.dur*1000;s.eventName=e.nm;
      log('◆ <b>'+e.nm+'</b> — '+e.msg+' ('+e.dur+'s)',e.cls);flash(e.col);}}
  function checkEventEnd(){if(s.eventMult!==1&&s.eventUntil<=Date.now()){
    s.eventMult=1;s.eventName="";log("이벤트 종료 — 채굴 정상화","auto");}}

  let lastEra=era();
  function checkHalving(){const e=era();if(e>lastEra){lastEra=e;
    log('⛓ <b>반감기 발생!</b> ERA '+(e+1)+' 진입 · 블록 보상 절반으로',"halving");
    flash("rgba(61,214,224,0.45)");}}

  const autoLines=["논스 탐색 중...","머클루트 검증","채굴풀 동기화","난이도 재계산",
    "해시 연산 가동","블록 헤더 스캔","SHA-256 라운드","UTXO 갱신","멤풀 정리","논스 +1 증가"];
  function tick(){
    const now=Date.now();const dt=(now-s.lastTick)/1000;s.lastTick=now;
    s.bal+=autoRate()*dt;
    s.diffProg+=dt/(18*difficulty());
    if(s.diffProg>=1){s.diffProg=0;const r=findBlock(false);
      log('★ 자동 채굴 <b>블록 #'+s.blocks+' 발견!</b> +'+fmt(r),"hit");}
    if(Math.random()<0.32)
      log(autoLines[Math.floor(Math.random()*autoLines.length)]+
        ' <span style="color:var(--green)">+'+fmt(autoRate())+'</span>',"auto");
    maybeEvent();checkEventEnd();checkHalving();autoBuy();render();
    const up=Math.floor((now-s.started)/1000);
    $("uptime").textContent="UPTIME "+("0"+Math.floor(up/60)).slice(-2)+":"+("0"+(up%60)).slice(-2);
    save();}

  const btn=$("hashBtn"),cool=$("cool");let onCool=false;
  function punch(){if(onCool)return;
    const r=Math.random();let txt,color;
    if(r<0.004){const reward=findBlock(true);s.hits++;
      txt="+"+fmt(reward);color="#fff";
      log('💎💎 <b>JACKPOT — 희귀 블록 채굴!!</b> +'+fmt(reward)+' NVX','jackpot');
      flash("rgba(247,147,26,0.5)");bigShake();
    }else if(r<0.05){const reward=punchBase()*40;s.bal+=reward;s.hits++;s.diffProg+=0.04;
      txt="+"+fmt(reward);color="var(--gold-soft)";
      log('✦ 럭키 해시! +'+fmt(reward),"hit");showWinHash(targetZeros());
    }else if(r<0.09){const loss=Math.min(s.bal,punchBase()*15);s.bal-=loss;
      txt="-"+fmt(loss);color="var(--red)";
      log('⚡ 해시 폭주 — 전기료 손실 -'+fmt(loss),"boom");
    }else{const reward=punchBase();s.bal+=reward;s.diffProg+=0.015;
      txt="+"+fmt(reward);color="var(--green)";}
    floatNum(txt,color,50,55);render();save();
    onCool=true;cool.style.transition="none";cool.style.width="100%";
    requestAnimationFrame(()=>{cool.style.transition="width .5s linear";cool.style.width="0%";});
    setTimeout(()=>{onCool=false;},500);}
  function bigShake(){$("app").animate(
    [{transform:"translateX(0)"},{transform:"translateX(-6px)"},
     {transform:"translateX(6px)"},{transform:"translateX(0)"}],{duration:280,iterations:2});}
  btn.addEventListener("click",punch);

  let saveT=0;
  function save(){const now=Date.now();if(now-saveT<800)return;saveT=now;
    try{localStorage.setItem(SAVE,JSON.stringify(s));}catch(e){}}

  (function offline(){const last=s.lastTick||Date.now();const away=(Date.now()-last)/1000;
    s.lastTick=Date.now();
    if(away>30){const earned=autoRate()*Math.min(away,12*3600);s.bal+=earned;
      log('🌙 오프라인 채굴 보상 ('+Math.floor(away/60)+'분) +'+fmt(earned),"up");}})();

  log("노드 부팅 완료 · 솔로 채굴 시작","up");
  lastEra=era();render();startHashLoop();setInterval(tick,1000);
})();
</script>
</body>
</html>
