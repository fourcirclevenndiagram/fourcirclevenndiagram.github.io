<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>PARK RUN — 공원 러닝 감상</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0f1a;touch-action:none;
    font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;user-select:none;-webkit-user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{width:100%;height:100%;display:block;image-rendering:pixelated;image-rendering:crisp-edges}

  .panel{position:absolute;background:rgba(12,16,28,.62);border:2px solid rgba(255,244,217,.28);
    box-shadow:0 0 0 2px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.35);color:#fff4d9}

  #title{top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;padding:6px 9px;font-size:10px;
    font-weight:800;letter-spacing:1px;line-height:1.5}
  #title .sub{font-size:9px;font-weight:600;opacity:.75;letter-spacing:0}
  #phase{display:inline-block;margin-top:2px;font-size:9px;color:#ffe08a}

  #hud{top:calc(env(safe-area-inset-top,0px) + 10px);right:10px;padding:8px 10px;min-width:118px}
  #hud .mode{font-size:10px;font-weight:800;color:#8fe3b0;margin-bottom:5px;letter-spacing:.5px}
  #hud .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:2px 0}
  #hud .lb{font-size:9px;opacity:.7}
  #hud .vl{font-family:'Courier New',ui-monospace,monospace;font-weight:800;font-size:13px;letter-spacing:-.5px}
  #hud .un{font-size:8px;opacity:.6;font-weight:600;margin-left:1px}
  #hHeart{display:inline-block;color:#ff6b81;animation:beat .45s ease-in-out infinite;transform-origin:center}
  @keyframes beat{0%,100%{transform:scale(1)}22%{transform:scale(1.4)}}
  @media (prefers-reduced-motion: reduce){#hHeart{animation:none}}

  #ctrl{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);
    display:flex;justify-content:center;gap:10px}
  .btn{min-width:74px;min-height:46px;padding:8px 12px;border:0;color:#fff4d9;font-weight:800;font-size:12px;
    font-family:inherit;background:#232b3d;cursor:pointer;letter-spacing:.5px;
    box-shadow:0 0 0 2px #000, inset 3px 3px 0 rgba(255,255,255,.13), inset -3px -4px 0 rgba(0,0,0,.4)}
  .btn:active{transform:translateY(2px);box-shadow:0 0 0 2px #000, inset 3px 3px 0 rgba(0,0,0,.3)}
  .btn.warm{background:#4a3320;color:#ffd98a}
  #paused-tag{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);padding:8px 14px;
    font-size:13px;font-weight:800;letter-spacing:2px;display:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="title" class="panel">🌳 PARK RUN
    <div class="sub">공원 러닝 감상</div>
    <span id="phase">☀️ 낮</span>
  </div>

  <div id="hud" class="panel">
    <div class="mode" id="hMode">🏃 조깅 중</div>
    <div class="row"><span class="lb">속도</span><span><span class="vl" id="hSpd">0.0</span><span class="un">km/h</span></span></div>
    <div class="row"><span class="lb">심박 <span id="hHeart">♥</span></span><span><span class="vl" id="hHr">98</span><span class="un">bpm</span></span></div>
    <div class="row"><span class="lb">거리</span><span><span class="vl" id="hDist">0.00</span><span class="un">km</span></span></div>
    <div class="row"><span class="lb">시간</span><span><span class="vl" id="hTime">00:00</span></span></div>
  </div>

  <div id="paused-tag" class="panel">⏸ 일시정지</div>

  <div id="ctrl">
    <button class="btn" id="bPause">⏸ 정지</button>
    <button class="btn warm" id="bSprint">⚡ 스퍼트</button>
    <button class="btn" id="bSpeed">×1</button>
  </div>
</div>

<script>
'use strict';
/* ============ 기본 ============ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 180, H = 390, horB = 156;

const FOC = 110;        // 투영 초점
const RW  = 1.5;        // 트랙 반폭(월드 단위)
const VIS = 2.0;        // 체감 속도 배율
const SPAWN_Z = 70;
const CYCLE = 240;      // 하루 주기(초)

const R  = (a,b)=>a+Math.random()*(b-a);
const RI = (a,b)=>Math.floor(R(a,b+1));
const pick = a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function mixHex(h1,h2,t){const a=hex2rgb(h1),b=hex2rgb(h2);
  return `rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`;}
function keyLerp(stops,t){ // stops: [t, ...values]
  for(let i=0;i<stops.length-1;i++){
    const a=stops[i],b=stops[i+1];
    if(t>=a[0]&&t<=b[0]){const k=(t-a[0])/(b[0]-a[0]||1);return [a,b,k];}
  }
  return [stops[stops.length-1],stops[stops.length-1],0];
}

/* ============ 스프라이트 ============ */
const SPR = {
  tree1:{wh:2.9, lod:'#3f8a43', c:{G:'#4caf50',L:'#82d76a',D:'#357a3a',T:'#7a4a28'}, g:[
    "....GGGG....","..GGGLLGGG..",".GGLLGGGGGG.","GGGGGGGGDGGG","GGGDGGGGGGGG",
    "GGGGGGDDGGGG",".GGDGGGGGGG.","..GGGGGGGG..","....GGGG....",".....TT.....",
    ".....TT.....","....TTTT...."]},
  tree3:{wh:3.1, lod:'#2e8f5e', c:{A:'#2e8f5e',a:'#1f6b45',T:'#6b4226'}, g:[
    "....A....","...AAA...","..AAAAA..","...AaA...","..AAAAA..",".AAAaAAA.",
    "..AAAAA..",".AAAAAAA.","AAAaAAAAA","....T....","....T...."]},
  bush:{wh:0.7, lod:'#4f9e4a', c:{B:'#4f9e4a',b:'#3a7d38'}, g:[
    ".BBBBBB.","BBBbBBBB","BBBBBBbB",".BBBBBB."]},
  flower:{wh:0.34, lod:'#ff9fc0', c:{F:'#ff9fc0',Y:'#ffd94a',S:'#3f8f3f'}, g:[
    ".F.","FYF",".S.",".S."]},
  rock:{wh:0.32, lod:'#9aa3ad', c:{R:'#9aa3ad',r:'#78828e'}, g:[
    ".RRR.","RRRRR","RrRRr"]},
  lamp:{wh:3.3, lod:'#4a545f', c:{H:'#39424e',Y:'#e9edf2',P:'#4a545f'}, g:[
    ".HHH.","HYYYH",".HHH.","..P..","..P..","..P..","..P..","..P..","..P..",
    "..P..","..P..","..P..",".PPP.","PPPPP"]},
  bench:{wh:1.0, lod:'#b07c46', c:{O:'#b07c46',o:'#6f4a26'}, g:[
    "OOOOOOOOOOOO","OOOOOOOOOOOO","o..........o","OOOOOOOOOOOO","o..........o","o..........o"]},
  personA:{wh:1.75, lod:'#c88', c:{}, g:[
    "..HHHH..",".HSSSSH.","..SSSS..",".CCCCCC.","CCCCCCCC","CCCCCCCC",".CCCCCC.",
    "..NNNN..","..NNNN..",".NN..NN.",".NN..NN.",".ss..ss."]},
  personB:{wh:1.75, lod:'#c88', c:{}, g:[
    "..HHHH..",".HSSSSH.","..SSSS..",".CCCCCC.","CCCCCCCC","CCCCCCCC",".CCCCCC.",
    "..NNNN..","..NNNN..","..NNNN..","..N..N..","..s..s.."]},
  sit:{wh:1.32, lod:'#c88', c:{}, g:[
    ".HHHH.",".SSSS.","CCCCCC","CCCCCC",".NNNN.",".N..N.",".N..N.",".s..s."]},
  catSit:{wh:0.62, lod:'#f0a35e', c:{e:'#1d1d1d'}, g:[
    "......M.","M.M...M.","MeM...M.","MMMMMMM.",".MMMMMM.",".MM..MM.",".MM..MM."]},
  catWalkA:{wh:0.5, lod:'#f0a35e', c:{e:'#1d1d1d'}, g:[
    "M..........","M.......M.M","MM......MeM",".MMMMMMMMMM","..M...M....","....M...M.."]},
  catWalkB:{wh:0.5, lod:'#f0a35e', c:{e:'#1d1d1d'}, g:[
    "M..........","M.......M.M","MM......MeM",".MMMMMMMMMM","....M...M..","..M...M...."]},
  sqA:{wh:0.42, lod:'#a06a35', c:{r:'#d99a5e',R:'#a06a35'}, g:[
    "rr.......","rrrr.....","rrrr..R.R",".rrrRRRRR","..RRRRRRR","...RRRRR.","...R..R.."]},
  sqB:{wh:0.42, lod:'#a06a35', c:{r:'#d99a5e',R:'#a06a35'}, g:[
    "rr.......","rrrr.....","rrrr..R.R",".rrrRRRRR","..RRRRRRR","...RRRRR.","..R....R."]},
  birdA:{wh:0, c:{}, g:["X.....X",".X...X.","..XXX.."]},
  birdB:{wh:0, c:{}, g:["..XXX..",".X...X.","X.....X"]},
  bflyA:{wh:0, c:{b:'#4a3b2f'}, g:["FF.FF","FFbFF",".FbF."]},
  bflyB:{wh:0, c:{b:'#4a3b2f'}, g:["..b..",".FbF.",".FbF."]},
  balloon:{wh:0, c:{W:'#fff3d9',k:'#6b5a3a',B:'#8a5a2e'}, g:[
    "...RRRRR...",".RRRRRRRRR.",".WWWWWWWWW.","RRRRRRRRRRR","WWWWWWWWWWW",
    "RRRRRRRRRRR",".WWWWWWWWW.",".RRRRRRRRR.","..RRRRRRR..","...RRRRR...",
    "....k.k....","....k.k....","....BBB....","....BBB...."]},
  cloud1:{wh:0, c:{W:'#ffffff'}, g:["..WWWWW...",".WWWWWWWW.","WWWWWWWWWW",".WWWWWWWW."]},
  cloud2:{wh:0, c:{W:'#ffffff'}, g:["..WWW..",".WWWWW.","WWWWWWW"]},
  sun:{wh:0, c:{Y:'#ffdf6b',L:'#fff2b0'}, g:[
    "..YYY..",".YYYYY.","YYLLLYY","YLLLLLY","YYLLLYY",".YYYYY.","..YYY.."]},
  moon:{wh:0, c:{M:'#f2eed6'}, g:[
    "..MMM..",".MMMM..","MMMM...","MMM....","MMMM...",".MMMM..","..MMM.."]}
};
// 벚꽃나무 = tree1 팔레트 교체
const PAL_BLOSSOM = {G:'#f6aecd',L:'#ffe4f0',D:'#e483b0',T:'#8a5a3a'};

const HAIRS=['#3a2c22','#171717','#6b4a2f','#8a8f96','#b5651d','#4a3b52'];
const SKINS=['#ffd9b0','#e8b98a','#c98d5f'];
const SHIRTS=['#e85d5d','#4f8fe8','#58b368','#f2a33c','#9b6fd4','#ff8fb3','#5ac8c8'];
const PANTS=['#3f4a5a','#5a4632','#2f3e2f','#46466b'];
const CATCOLS=['#f0a35e','#8d97a3','#3b4046','#c9b8a3'];
const BIRDCOLS=['#37405c','#e8eef4','#c96a6a'];
const BFLYCOLS=['#ff9fc0','#ffd94a','#8fb7ff','#ffb27a'];
const BALCOLS=['#e85d5d','#4f8fe8','#f2a33c','#9b6fd4'];

function drawSpr(spr, x, y, px, pal, flip){ // x,y = 바닥 중앙
  const rows=spr.g, hR=rows.length, wR=rows[0].length;
  if(px < 0.7){ // 원거리 LOD
    if(spr.lod){ ctx.fillStyle=spr.lod; ctx.fillRect(Math.round(x-1), Math.round(y-2), 2, 2); }
    return;
  }
  const totW=wR*px, x0=x-totW/2, y0=y-hR*px;
  if(x0>W || x0+totW<0 || y0>H || y<0) return;
  const s2=Math.max(1, Math.ceil(px));
  for(let j=0;j<hR;j++){
    const row=rows[j];
    const yy=Math.round(y0+j*px);
    if(yy>H) break;
    for(let i=0;i<wR;i++){
      const ch=row.charAt(flip? wR-1-i : i);
      if(ch==='.') continue;
      const col=(pal&&pal[ch])||spr.c[ch];
      if(!col) continue;
      ctx.fillStyle=col;
      ctx.fillRect(Math.round(x0+i*px), yy, s2, s2);
    }
  }
}

/* ============ 하늘/시간 팔레트 ============ */
const SKY_TOP=[[0,'#ff9e7d'],[.08,'#7cc4f5'],[.45,'#6fbef5'],[.53,'#ff8e5e'],[.60,'#584a86'],[.68,'#141b3d'],[.92,'#141b3d'],[.97,'#5d4a72'],[1,'#ff9e7d']];
const SKY_BOT=[[0,'#ffd9a8'],[.08,'#d9f1ff'],[.45,'#cfeeff'],[.53,'#ffc98a'],[.60,'#c97b96'],[.68,'#2a3566'],[.92,'#2a3566'],[.97,'#b0788c'],[1,'#ffd9a8']];
const TINT=[[0,255,196,160,.13],[.10,255,255,255,0],[.44,255,255,255,0],[.53,255,152,92,.20],[.60,110,96,168,.30],[.68,42,52,110,.48],[.92,42,52,110,.48],[.97,200,150,168,.22],[1,255,196,160,.13]];
const NIGHT=[[0,0],[.55,0],[.66,1],[.90,1],[.99,0],[1,0]];

function skyCol(stops,t){const [a,b,k]=keyLerp(stops,t);return mixHex(a[1],b[1],k);}
function tintCol(t){const [a,b,k]=keyLerp(TINT,t);
  return {r:lerp(a[1],b[1],k),g:lerp(a[2],b[2],k),b:lerp(a[3],b[3],k),a:lerp(a[4],b[4],k)};}
function nightAmt(t){const [a,b,k]=keyLerp(NIGHT,t);return lerp(a[1],b[1],k);}
function phaseLabel(t){
  if(t<.08) return '🌅 새벽'; if(t<.45) return '☀️ 낮';
  if(t<.62) return '🌇 노을'; if(t<.95) return '🌙 밤'; return '🌅 새벽';
}

/* ============ 상태 ============ */
let su=0, distKm=0, tSec=0, cyc=0.12, worldT=0;
let paused=false, mult=1, autoPaused=false;

// 러너
let v=0, targetV=9.5, state='jog', stTimer=R(18,35);
let hr=96, cad=160, ph=0, hrN=0;

const objects=[], birds=[], clouds=[], petals=[], flies=[];
let stars=[], balloon=null, tPasser=R(40,80), tBird=R(2,5);

/* ============ 러너 로직 ============ */
function setState(s, dur){
  state=s;
  if(s==='walk'){targetV=R(4.6,6.0); stTimer=dur||R(6,13);}
  else if(s==='jog'){targetV=R(8.6,11.2); stTimer=dur||R(18,40);}
  else {targetV=R(15,17.5); stTimer=dur||R(5,8);}
}
function nextState(){
  if(state==='sprint') setState(Math.random()<.7?'walk':'jog');
  else if(state==='walk') setState('jog');
  else { const r=Math.random();
    if(r<.12) setState('walk'); else if(r<.19) setState('sprint'); else setState('jog'); }
}
function updateRunner(dt){
  stTimer-=dt; if(stTimer<=0) nextState();
  const acc=(state==='sprint'?3.6:2.2);
  v += clamp(targetV-v, -acc*dt*1.6, acc*dt);
  // 심박
  let tHr = v<6.5 ? 96+v*3 : 116+(v-6)*6.2;
  if(state==='sprint') tHr+=8;
  hrN += dt;
  tHr += Math.sin(hrN*0.7)*2 + Math.sin(hrN*2.3);
  hr += clamp(tHr-hr, -3.2*dt, 6.5*dt);
  hr = clamp(hr, 78, 188);
  // 케이던스 & 보행 위상
  cad = v<6.5 ? 100+v*3 : clamp(138+v*3.2, 120, 192);
  ph += cad/60*dt;
  // 이동
  distKm += v/3600*dt;
  su += v/3.6*VIS*dt;
  tSec += dt;
}

/* ============ 경로 곡선 ============ */
function pathC(s){ return 3.0*Math.sin(s*0.018) + 1.5*Math.sin(s*0.045+1.7); }

/* ============ 스폰 ============ */
function side(){ return Math.random()<.5?-1:1; }
function addObj(o){ o.z=o.z||SPAWN_Z; objects.push(o); }

const SPAWNS=[
 {min:4.5,max:8.5,f(){ const r=Math.random();
   const spr = r<.42?'tree1' : r<.62?'tree3' : 'tree1';
   const bl = (spr==='tree1' && Math.random()<.34);
   addObj({t:'tree',spr,bl,x:side()*R(2.4,5.4)});}},
 {min:9,max:18,f(){ addObj({t:'bush',x:side()*R(2.0,4.2)}); }},
 {min:6,max:13,f(){ const sd=side(), n=RI(2,4), bz=SPAWN_Z;
   for(let i=0;i<n;i++) addObj({t:'flower',z:bz-R(0,4),x:sd*R(1.9,3.4),
     pal:{F:pick(BFLYCOLS),Y:'#ffd94a',S:'#3f8f3f'}});
   if(Math.random()<.3) addObj({t:'bfly',z:bz-2,x:sd*R(1.9,3.2),col:pick(BFLYCOLS),ph:R(0,6)});}},
 {min:20,max:26,lastOff:10,f(){ this.side=-(this.side||1);
   addObj({t:'lamp',x:this.side*2.05});}},
 {min:55,max:100,f(){ addObj({t:'bench',x:side()*2.45,sit:Math.random()<.4,
   pal:persPal()});}},
 {min:26,max:40,f(){ addObj({t:'rock',x:side()*R(2.0,4.0)}); }},
 {min:14,max:30,f(){ const on=Math.random()<.7; // 마주 오는 사람 / 같은 방향
   addObj({t:'person', x:on?-0.85:0.85, v:on?-1.5*VIS:1.35*VIS,
     pal:persPal(), ph:R(0,9), flip:!on});}},
 {min:55,max:120,f(){ if(Math.random()<.58)
     addObj({t:'catSit',x:side()*R(1.9,3.0),pal:{M:pick(CATCOLS)},ph:R(0,9)});
   else { const d=side();
     addObj({t:'catWalk',z:R(16,26),x:-d*5.5,vx:d*3.4,pal:{M:pick(CATCOLS)},ph:R(0,9)});}}},
 {min:70,max:150,f(){ const d=side();
   addObj({t:'sq',z:R(12,20),x:-d*5.5,vx:d*4.8,ph:R(0,9)});}}
];
SPAWNS.forEach(sp=>{sp.last=0;sp.cur=R(sp.min,sp.max)*Math.random();});

function persPal(){
  return {H:pick(HAIRS),S:pick(SKINS),C:pick(SHIRTS),N:pick(PANTS),s:'#2b2b2b'};
}
function spawnBird(){
  const dir=side(), n=RI(1,3), y=R(18,60), col=pick(BIRDCOLS), sp=R(16,30);
  for(let i=0;i<n;i++)
    birds.push({x:dir<0?W+8+i*10:-8-i*10, y:y+R(-4,4), vx:-dir*sp, col, ph:R(0,9)});
}
function initClouds(){
  clouds.length=0;
  for(let i=0;i<4;i++) clouds.push({x:R(0,W), y:R(8,70), s:R(0.9,1.7),
    spr:Math.random()<.5?'cloud1':'cloud2', vx:R(1.2,3)});
}
function initStars(){
  stars=[]; for(let i=0;i<44;i++) stars.push({x:Math.random(),y:Math.random()*0.85,p:R(0,9)});
}
function initFlies(){
  flies.length=0;
  for(let i=0;i<9;i++) flies.push({x:R(0,1),y:R(0.2,0.9),p:R(0,9),vx:R(-3,3),vy:R(-2,2)});
}

/* ============ 업데이트 ============ */
function update(dt){
  updateRunner(dt);
  worldT+=dt;
  cyc=(cyc+dt/CYCLE)%1;
  const night=nightAmt(cyc);
  const vVis=v/3.6*VIS;

  // 거리 기반 스포너
  for(const sp of SPAWNS){
    if(su-sp.last > sp.cur){
      sp.last=su; sp.cur=R(sp.min,sp.max)*(sp===SPAWNS[6]?(1+night*1.1):1);
      sp.f();
    }
  }
  // 시간 기반: 새 / 지나쳐가는 러너 / 열기구
  tBird-=dt; if(tBird<=0){ if(night<.6) spawnBird(); tBird=R(3.5,9); }
  tPasser-=dt;
  if(tPasser<=0){ tPasser=R(45,95);
    if(v<12 && night<.7) addObj({t:'person',z:1.4,x:0.6,v:4.4*VIS,pal:persPal(),ph:R(0,9),flip:true}); }
  if(!balloon && Math.random()<dt/110 && night<.4)
    balloon={x:-12,y:R(14,34),vx:R(2.5,4),col:pick(BALCOLS)};
  if(balloon){ balloon.x+=balloon.vx*dt; balloon.y+=Math.sin(worldT*.5)*dt*1.2;
    if(balloon.x>W+16) balloon=null; }

  // 오브젝트 이동
  for(let i=objects.length-1;i>=0;i--){
    const o=objects[i];
    o.z -= (vVis-(o.v||0))*dt;
    if(o.vx!==undefined) o.x += o.vx*dt;
    if(o.t==='bfly'){ o.x += Math.sin(worldT*2+o.ph)*dt*.6; }
    if(o.z<0.35 || o.z>SPAWN_Z+8 || (o.vx&&Math.abs(o.x)>7)){ objects.splice(i,1); continue; }
    // 벚꽃잎
    if(o.t==='tree' && o.bl && o.z<10 && o.z>2 && petals.length<36 && Math.random()<dt*1.4){
      const dy=FOC/o.z, x=W/2+(pathC(su+o.z)-pathC(su)+o.x)*dy;
      petals.push({x:x+R(-8,8), y:horB+dy-o.z*R(6,14), vx:R(-6,-2), vy:R(6,12), p:R(0,9), l:R(2.5,4)});
    }
  }
  for(let i=petals.length-1;i>=0;i--){ const p=petals[i];
    p.x+=(p.vx+Math.sin(worldT*3+p.p)*4)*dt; p.y+=p.vy*dt; p.l-=dt;
    if(p.l<=0||p.y>H) petals.splice(i,1); }

  for(let i=birds.length-1;i>=0;i--){ const b=birds[i]; b.x+=b.vx*dt;
    b.y+=Math.sin(worldT*2+b.ph)*dt*3;
    if(b.x<-14||b.x>W+14) birds.splice(i,1); }

  for(const c of clouds){ c.x-=(c.vx+vVis*.12)*dt;
    if(c.x<-24){ c.x=W+R(8,26); c.y=R(8,70); } }

  if(night>0.05) for(const f of flies){
    f.p+=dt*R(2,3); f.x+=f.vx*dt/W; f.y+=f.vy*dt/H;
    if(Math.random()<dt*.5){ f.vx=R(-3,3); f.vy=R(-2,2); }
    f.x=(f.x+1)%1; f.y=clamp(f.y,0.15,0.95);
  }
}

/* ============ 렌더 ============ */
function render(){
  const night=nightAmt(cyc);
  const bobAmp=0.8+v*0.16;
  const bobY=-Math.abs(Math.sin(ph*Math.PI))*bobAmp;
  const bobX=Math.sin(ph*Math.PI)*(0.4+v*0.05);
  const hor=Math.round(horB+bobY), cx=W/2+bobX;
  const c0=pathC(su);

  // --- 하늘 (밴드) ---
  const NB=9, top=skyCol(SKY_TOP,cyc), bot=skyCol(SKY_BOT,cyc);
  for(let i=0;i<NB;i++){
    ctx.fillStyle=mixHex(rgb2hex(top),rgb2hex(bot),i/(NB-1));
    const y0=Math.round(hor*i/NB), y1=Math.round(hor*(i+1)/NB);
    ctx.fillRect(0,y0,W,y1-y0+1);
  }
  // 해
  if(cyc<0.58){ const pr=clamp(cyc/0.58,0,1);
    drawSpr(SPR.sun, W*(0.14+0.72*pr), hor-Math.sin(pr*Math.PI)*hor*0.8+6, 1.6); }
  // 구름
  for(const c of clouds){ ctx.globalAlpha=0.92;
    drawSpr(SPR[c.spr], c.x, hor-(70-c.y)*0.9, c.s); ctx.globalAlpha=1; }
  // 열기구
  if(balloon) drawSpr(SPR.balloon, balloon.x, hor-(70-balloon.y), 1.5, {R:balloon.col});
  // 새
  for(const b of birds)
    drawSpr(Math.sin(worldT*9+b.ph)>0?SPR.birdA:SPR.birdB, b.x, hor-(70-b.y)*0.95, 1, {X:b.col});

  // --- 원경: 산 + 숲 실루엣 ---
  ctx.fillStyle='#a8c2e0';
  for(let x=0;x<W;x+=2){
    const h1=10+6*Math.sin((x+su*0.9)*0.045)+4*Math.sin((x+su*0.9)*0.11+2);
    ctx.fillRect(x,hor-Math.round(h1),2,Math.round(h1)+1);
  }
  ctx.fillStyle='#3f7d45';
  for(let x=0;x<W;x+=2){
    const h2=4+3*Math.sin((x+su*3.2)*0.09)+2.4*Math.sin((x+su*3.2)*0.2+1);
    ctx.fillRect(x,hor-Math.round(h2),2,Math.round(h2)+1);
  }

  // --- 지면 스캔라인 ---
  for(let y=hor+1;y<H;y++){
    const dy=y-hor, z=FOC/dy, s=su+z;
    const xw=pathC(s)-c0;
    const g=(Math.floor(s*0.7)&1)?'#6db844':'#7ac74f';
    ctx.fillStyle=g; ctx.fillRect(0,y,W,1);
    const half=RW*dy, cxs=cx+xw*dy;
    const p=(Math.floor(s*1.5)&1)?'#e8cf9a':'#dcc389';
    ctx.fillStyle='#b98d55';
    ctx.fillRect(Math.round(cxs-half-Math.max(1,dy*.06)),y,Math.max(1,Math.round(dy*.06))+1,1);
    ctx.fillRect(Math.round(cxs+half),y,Math.max(1,Math.round(dy*.06))+1,1);
    ctx.fillStyle=p; ctx.fillRect(Math.round(cxs-half),y,Math.max(1,Math.round(half*2)),1);
    const b2=Math.floor(s*1.5);
    if(b2%4===0 && (s-Math.floor(s))<0.4){ ctx.fillStyle='#c9ac74';
      ctx.fillRect(Math.round(cxs-dy*.05),y,Math.max(1,Math.round(dy*.1)),1); }
  }

  // --- 월드 오브젝트 (먼 것부터) ---
  objects.sort((a,b)=>b.z-a.z);
  const lamps=[];
  for(const o of objects){
    const dy=FOC/o.z; if(dy>H*1.6) continue;
    const y=hor+dy;
    const x=cx+(pathC(su+o.z)-c0+o.x)*dy;
    let spr,pal=o.pal,flip=o.flip;
    switch(o.t){
      case 'tree': spr=SPR[o.spr]; if(o.bl) pal=PAL_BLOSSOM; break;
      case 'bush': spr=SPR.bush; break;
      case 'flower': spr=SPR.flower; break;
      case 'rock': spr=SPR.rock; break;
      case 'lamp': spr=SPR.lamp; if(night>0.05) lamps.push({x,y,dy}); break;
      case 'bench': spr=SPR.bench; break;
      case 'person': spr=(Math.floor(worldT*6+o.ph)&1)?SPR.personA:SPR.personB; break;
      case 'catSit': spr=SPR.catSit; break;
      case 'catWalk': spr=(Math.floor(worldT*7+o.ph)&1)?SPR.catWalkA:SPR.catWalkB;
        flip=o.vx<0; break;
      case 'sq': spr=(Math.floor(worldT*9+o.ph)&1)?SPR.sqA:SPR.sqB; flip=o.vx<0; break;
      case 'bfly': spr=(Math.floor(worldT*10+o.ph)&1)?SPR.bflyA:SPR.bflyB;
        pal={F:o.col}; break;
    }
    if(!spr) continue;
    const px=spr.wh*dy/spr.g.length;
    let yd=y;
    if(o.t==='bfly') yd = y-(0.55+0.25*Math.sin(worldT*3+o.ph))*dy;
    drawSpr(spr,x,yd,px,pal,flip);
    if(o.t==='bench'&&o.sit) drawSpr(SPR.sit,x,y,SPR.sit.wh*dy/SPR.sit.g.length,o.pal);
  }

  // 벚꽃잎
  for(const p of petals){ ctx.fillStyle=(p.p%2<1)?'#ffc4dc':'#ff9fc0';
    ctx.fillRect(Math.round(p.x),Math.round(p.y),1,1); }

  // --- 시간대 틴트 ---
  const tn=tintCol(cyc);
  if(tn.a>0.005){
    ctx.globalCompositeOperation='multiply';
    ctx.fillStyle=`rgba(${tn.r|0},${tn.g|0},${tn.b|0},${tn.a})`;
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';
  }

  // 별 / 달 (틴트 이후 = 밝게)
  if(night>0.02){
    for(const st of stars){
      const a=night*(0.35+0.65*Math.abs(Math.sin(worldT*.8+st.p)));
      ctx.fillStyle=`rgba(255,244,214,${a.toFixed(2)})`;
      ctx.fillRect(Math.round(st.x*W),Math.round(st.y*hor*0.8),1,1);
    }
    const prm=clamp((cyc-0.60)/0.38,0,1);
    if(cyc>0.60&&cyc<0.99)
      drawSpr(SPR.moon, W*(0.16+0.68*prm), hor-Math.sin(prm*Math.PI)*hor*0.78+4, 1.4);
  }

  // 가로등 글로우 + 반딧불 (가산)
  if(night>0.05){
    ctx.globalCompositeOperation='lighter';
    for(const L of lamps){
      const s=SPR.lamp.wh*L.dy/SPR.lamp.g.length;
      const hy=L.y-(SPR.lamp.g.length-1.6)*s;
      const g=s*3.2, a=night*0.5;
      ctx.fillStyle=`rgba(255,214,110,${(a*.5).toFixed(2)})`;
      ctx.fillRect(L.x-g,hy-g*.6,g*2,g*1.2);
      ctx.fillStyle=`rgba(255,224,130,${a.toFixed(2)})`;
      ctx.fillRect(L.x-g*.4,hy-g*.3,g*.8,g*.6);
      ctx.fillStyle=`rgba(255,214,110,${(night*.12).toFixed(2)})`;
      ctx.fillRect(L.x-s*2.4,L.y-s*1.2,s*4.8,s*1.4);
    }
    for(const f of flies){
      const a=night*(0.25+0.75*Math.max(0,Math.sin(f.p)));
      ctx.fillStyle=`rgba(255,233,138,${a.toFixed(2)})`;
      const fy=hor+8+f.y*(H-hor-16);
      ctx.fillRect(Math.round(f.x*W),Math.round(fy),1,1);
      if(a>0.7) ctx.fillRect(Math.round(f.x*W)-1,Math.round(fy),3,1);
    }
    ctx.globalCompositeOperation='source-over';
  }
}

function rgb2hex(rgb){ // "rgb(r,g,b)" → "#rrggbb"
  const m=rgb.match(/\d+/g);
  return '#'+m.slice(0,3).map(n=>(+n).toString(16).padStart(2,'0')).join('');
}

/* ============ HUD ============ */
const hSpd=document.getElementById('hSpd'), hHr=document.getElementById('hHr'),
      hDist=document.getElementById('hDist'), hTime=document.getElementById('hTime'),
      hMode=document.getElementById('hMode'), hPhase=document.getElementById('phase'),
      hHeart=document.getElementById('hHeart');
let hudT=0;
function updateHUD(){
  hSpd.textContent=v.toFixed(1);
  hHr.textContent=Math.round(hr);
  hDist.textContent=distKm.toFixed(2);
  const m=Math.floor(tSec/60), s=Math.floor(tSec%60);
  hTime.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  hMode.textContent = state==='walk'?'🚶 걷는 중': state==='sprint'?'⚡ 스퍼트!!':'🏃 조깅 중';
  hPhase.textContent=phaseLabel(cyc);
  hHeart.style.animationDuration=(60/Math.max(60,hr)).toFixed(2)+'s';
}

/* ============ 루프 ============ */
let last=0;
function frame(t){
  const raw=Math.min((t-last)/1000,0.05); last=t;
  if(!paused){
    const dt=raw*mult;
    update(dt);
  }
  render();
  hudT+=raw; if(hudT>0.2){hudT=0;updateHUD();}
  requestAnimationFrame(frame);
}

/* ============ UI / 이벤트 ============ */
const bPause=document.getElementById('bPause'),
      bSprint=document.getElementById('bSprint'),
      bSpeed=document.getElementById('bSpeed'),
      pTag=document.getElementById('paused-tag');
function setPaused(p){
  paused=p;
  bPause.textContent=p?'▶ 재생':'⏸ 정지';
  pTag.style.display=p?'block':'none';
}
bPause.addEventListener('click',()=>setPaused(!paused));
bSprint.addEventListener('click',()=>{ if(!paused) setState('sprint',6.5); });
const MULTS=[1,2,4];
bSpeed.addEventListener('click',()=>{
  mult=MULTS[(MULTS.indexOf(mult)+1)%MULTS.length];
  bSpeed.textContent='×'+mult;
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ autoPaused=!paused; setPaused(true); }
  else if(autoPaused){ autoPaused=false; setPaused(false); }
});
function resize(){
  const vw=Math.max(1,window.innerWidth), vh=Math.max(1,window.innerHeight);
  W=180; H=clamp(Math.round(W*vh/vw),240,480);
  cv.width=W; cv.height=H;
  horB=Math.round(H*0.40);
  initStars();
}
window.addEventListener('resize',resize);

/* ============ 시작 ============ */
resize(); initClouds(); initFlies();
setState('jog'); v=8.5;
// 초기 풍경 미리 깔기
for(let z=4;z<SPAWN_Z;z+=R(4,8))
  addObj({t:'tree',z,spr:Math.random()<.5?'tree1':'tree3',
    bl:Math.random()<.3, x:side()*R(2.4,5.2)});
for(let z=8;z<SPAWN_Z;z+=22) addObj({t:'lamp',z,x:(z/22&1?1:-1)*2.05});
for(let z=6;z<SPAWN_Z;z+=R(7,14)) addObj({t:'flower',z,x:side()*R(1.9,3.4),
  pal:{F:pick(BFLYCOLS),Y:'#ffd94a',S:'#3f8f3f'}});
requestAnimationFrame(t=>{last=t;requestAnimationFrame(frame);});
</script>
