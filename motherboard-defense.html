   ============================================================= */

const N = 80;                       // 그리드 크기
const clamp = (v,a,b)=>v<a?a:(v>b?b:v);
const rnd = (a,b)=>a+Math.random()*(b-a);
const hyp = Math.hypot;

/* ---------- 이중 ㄹ자 경로 (가로 6줄) ---------- */
const WPTS = [
  [-3,6.5],   [70.5,6.5],
  [70.5,19.5],[10.5,19.5],
  [10.5,32.5],[70.5,32.5],
  [70.5,45.5],[10.5,45.5],
  [10.5,58.5],[70.5,58.5],
  [70.5,71.5],[12.5,71.5],
];
const segs = []; let TOTAL = 0;
for(let i=0;i<WPTS.length-1;i++){
  const [x1,y1]=WPTS[i],[x2,y2]=WPTS[i+1];
  const len=hyp(x2-x1,y2-y1);
  segs.push({x1,y1,x2,y2,len,acc:TOTAL});
  TOTAL+=len;
}
function posAt(d){
  d=clamp(d,0,TOTAL-0.0001);
  for(let i=segs.length-1;i>=0;i--){
    const s=segs[i];
    if(d>=s.acc){
      const t=(d-s.acc)/s.len;
      return {x:s.x1+(s.x2-s.x1)*t, y:s.y1+(s.y2-s.y1)*t,
              dx:(s.x2-s.x1)/s.len, dy:(s.y2-s.y1)/s.len};
    }
  }
  return {x:WPTS[0][0],y:WPTS[0][1],dx:1,dy:0};
}
// 경로 샘플 포인트(커버리지 계산용) + 코너 가중치
const pathPts = [];
for(let d=0; d<TOTAL; d+=1){
  const p = posAt(d);
  let w = 1;
  for(let i=1;i<WPTS.length-1;i++){
    if(hyp(p.x-WPTS[i][0], p.y-WPTS[i][1]) < 5) { w = 2; break; }
  }
  pathPts.push({x:p.x, y:p.y, w});
}
// 경로 셀 래스터(포탑 설치 금지 영역)
const pathCell = new Uint8Array(N*N);
for(let d=0; d<TOTAL; d+=0.35){
  const p=posAt(d);
  for(let cy=Math.floor(p.y-2); cy<=Math.ceil(p.y+2); cy++)
    for(let cx=Math.floor(p.x-2); cx<=Math.ceil(p.x+2); cx++){
      if(cx<0||cy<0||cx>=N||cy>=N) continue;
      if(hyp(cx+0.5-p.x, cy+0.5-p.y) <= 1.9) pathCell[cy*N+cx]=1;
    }
}
const BASE = {x:12.5, y:71.5};
// 포탑 후보지 (경로에서 2.2~6.5칸 거리)
const candidates = [];
for(let cy=3; cy<N-3; cy++)
  for(let cx=3; cx<N-3; cx++){
    if(pathCell[cy*N+cx]) continue;
    const px=cx+0.5, py=cy+0.5;
    if(hyp(px-BASE.x,py-BASE.y)<6) continue;
    let md=1e9;
    for(let i=0;i<pathPts.length;i+=2){
      const dd=hyp(px-pathPts[i].x, py-pathPts[i].y);
      if(dd<md) md=dd;
    }
    if(md>=2.4 && md<=6.5) candidates.push({x:px,y:py});
  }

/* ---------- 픽셀아트 스프라이트 ---------- */

    const col=pal[rows[y][x]];
    if(!col) continue;
    g.fillStyle=col; g.fillRect(x*S,y*S,S,S);
  }
  return {c,w,h};
}

function resize(){
  const wrap=document.getElementById('wrap');
  const ww=(wrap&&wrap.clientWidth)||390, wh=(wrap&&wrap.clientHeight)||500;
  CW=Math.floor(Math.min(ww-8, wh-8, 620));
  if(CW<200)CW=200;
  DPR=Math.min(2, (window.devicePixelRatio||1));
  cvs.style.width=CW+'px'; cvs.style.height=CW+'px';
  cvs.width=Math.floor(CW*DPR); cvs.height=Math.floor(CW*DPR);
  cell=CW/N;
  buildBG();
}

/* PCB 배경 프리렌더 */
function buildBG(){
  bgC=document.createElement('canvas');
  bgC.width=cvs.width; bgC.height=cvs.height;
  const g=bgC.getContext('2d');
  g.setTransform(DPR,0,0,DPR,0,0);
  // 기판
  g.fillStyle='#07231b'; g.fillRect(0,0,CW,CW);
  // 랜덤 회로 트레이스 (시드 고정 느낌으로 결정적 생성)
  let seed=12345;
  const srnd=()=>{ seed=(seed*16807)%2147483647; return seed/2147483647; };
  g.strokeStyle='rgba(35,110,80,0.35)'; g.lineWidth=Math.max(1,cell*0.25);
  for(let i=0;i<90;i++){
    let x=srnd()*CW, y=srnd()*CW;
    g.beginPath(); g.moveTo(x,y);
    const horiz = srnd()<0.5;
    const l1=(6+srnd()*18)*cell, l2=(4+srnd()*14)*cell;
    if(horiz){ x+= (srnd()<0.5?-1:1)*l1; g.lineTo(x,y); y+=(srnd()<0.5?-1:1)*l2; g.lineTo(x,y); }
    else { y+= (srnd()<0.5?-1:1)*l1; g.lineTo(x,y); x+=(srnd()<0.5?-1:1)*l2; g.lineTo(x,y); }
    g.stroke();
    g.fillStyle='rgba(60,160,110,0.45)';
    g.beginPath(); g.arc(x,y,Math.max(1.2,cell*0.35),0,7); g.fill();
  }
  // 납땜 패드
  g.fillStyle='rgba(255,215,106,0.12)';
  for(let i=0;i<130;i++){
    const x=srnd()*CW, y=srnd()*CW, s=Math.max(1,cell*0.5);
    g.fillRect(x,y,s,s);
  }
  // ㄹ자 경로 = 구리 트레이스
  g.lineCap='round'; g.lineJoin='round';
  g.beginPath();
  g.moveTo(WPTS[0][0]*cell, WPTS[0][1]*cell);
  for(let i=1;i<WPTS.length;i++) g.lineTo(WPTS[i][0]*cell, WPTS[i][1]*cell);
  g.strokeStyle='#5c3a1a'; g.lineWidth=cell*4.4; g.stroke();
  g.strokeStyle='#a86a2c'; g.lineWidth=cell*3.4; g.stroke();
  g.strokeStyle='#c98a3e'; g.lineWidth=cell*2.2; g.stroke();
  // 경로 중앙 라인
  g.strokeStyle='rgba(255,220,140,0.5)'; g.lineWidth=Math.max(1,cell*0.3);
  g.setLineDash([cell*1.5,cell*1.5]); g.stroke(); g.setLineDash([]);
  // 시작 표시
  g.fillStyle='rgba(255,90,90,0.8)';
  g.fillRect(0, (WPTS[0][1]-2.2)*cell, cell*1.2, cell*4.4);
}

/* ---------- 웨이브 ---------- */
function startWave(){
  S.wave++;
  if(S.wave>S.bestWave)S.bestWave=S.wave;
  const w=S.wave;
  const pool=['mouse','usb'];
  if(w>=2)pool.push('keyboard');
  if(w>=3)pool.push('headset');
  if(w>=4)pool.push('webcam');
  if(w>=5)pool.push('monitor');
  S.waveComp=pool;
  S.spawnQ=Math.min(36, 8+w*2);
  S.spawnT=0;
  S.bossQ=(w%5===0)? Math.min(3,Math.floor(w/5)) : 0;
  S.phase='wave';
  toast(w%5===0 ? `🚨 WAVE ${w} — 보스 프린터 출력 개시!` : `⚔️ WAVE ${w} 시작`);
}
function spawn(type){
  const d=MDEF[type], w=S.wave;
  const mult=1+0.23*(w-1)+0.024*(w-1)*(w-1);
  const spdMul=1+Math.min(0.5, w*0.014);
  S.monsters.push({
    id:mid++, type, dist:-rnd(0,2),
    hp:d.hp*mult, max:d.hp*mult,
    spd:d.spd*spdMul, bounty:Math.round(d.bounty*(1+w*0.06)),
    dmg:d.dmg, slowT:0, slowF:1, boss:!!d.boss,
  });
}

/* ---------- AI 건설 ---------- */
const AI_SAVE_MSG=['🤖 자금 확보 중...','🤖 최적 배치 좌표 계산 중...','🤖 경로 커버리지 분석 중...','🤖 위협 평가 알고리즘 가동...'];
function aiThink(){
  const T=S.towers;
  // 업그레이드 판단
  if(T.length>2 && Math.random()<0.32){
    let best=null;
    for(const t of T){ if(t.lv<3 && (!best || t.kills>best.kills)) best=t; }
    if(best){
      const uc=Math.round(TDEF[best.type].cost*0.9*best.lv);
      if(S.gold>=uc+60){
        S.gold-=uc; best.lv++;
        best.dmg*=1.55; best.range+=0.6; best.buildT=0.5;
        toast(`🤖 ${TDEF[best.type].name} Lv.${best.lv} 강화 완료 (-${uc}G)`);
        return;
      }
    }
  }
  if(T.length>=36){ return; }
  // 건설 계획
  if(!S.ai.plan){
    const counts={};
    for(const t of T) counts[t.type]=(counts[t.type]||0)+1;
    let best=null,bs=-1;
    for(const k in TDEF){
      if(S.wave+1<AI_GATE[k]) continue;
      const sc=AI_W[k]/(1+(counts[k]||0)*0.7)*(0.8+Math.random()*0.4);
      if(sc>bs){bs=sc;best=k;}
    }
    S.ai.plan=best;
  }
  const plan=S.ai.plan;
  const costMul=1+T.length*0.06;
  const cost=Math.round(TDEF[plan].cost*costMul);
  if(S.gold>=cost){
    const spot=findSpot(TDEF[plan].range, plan==='fan');
    if(spot){
      S.gold-=cost;
      const d=TDEF[plan];
      S.towers.push({
        x:spot.x,y:spot.y,type:plan,lv:1,cd:rnd(0,0.4),
        dmg:d.dmg,range:d.range,kills:0,buildT:0.8,spin:0,flashT:0,rangeT:2.2,
      });
      burst(spot.x,spot.y,'#9be8c0',10);
      toast(`🤖 ${d.name} 건설 → 경로 ${spot.cov}칸 커버 (-${cost}G)`);
      S.ai.plan=null;
    } else S.ai.plan=null;
  } else if(S.ai.msgT<=0){
    S.ai.msgT=4;
    const m=Math.random()<0.5
      ? `🤖 ${TDEF[plan].name} 목표 저축 중 (${Math.floor(S.gold)}/${cost}G)`
      : AI_SAVE_MSG[Math.floor(Math.random()*AI_SAVE_MSG.length)];
    toast(m);
  }
}
function findSpot(range, isFan){
  let best=null,bs=-1;
  const M=Math.min(candidates.length, 380);
  for(let i=0;i<M;i++){
    const c=candidates[Math.floor(Math.random()*candidates.length)];
    let ok=true;
    for(const t of S.towers){
      if(hyp(t.x-c.x,t.y-c.y)<5.2){ok=false;break;}
    }
    if(!ok)continue;
    let s=0,cov=0;
    const r2=range*range;
    for(const p of pathPts){
      const dx=p.x-c.x, dy=p.y-c.y;
      if(dx*dx+dy*dy<=r2){ cov++; s+=p.w*(isFan&&p.w>1?2.5:1); }
    }
    s+=Math.random()*5;
    if(s>bs){bs=s;best={x:c.x,y:c.y,cov};}
  }
  return best;
}

/* ---------- 전투 ---------- */
function damage(m, dmg, direct){
  if(!m || m.hp<=0) return;
  const d=MDEF[m.type];
  if(direct && d.dodge && Math.random()<d.dodge){
    pop(m, 'MISS', '#8ad4ff'); return;
  }
  m.hp-=dmg;
  if(m.hp<=0) kill(m);
}
function kill(m){
  m.hp=-1;
  S.kills++;
  S.gold+=m.bounty;
  pop(m, '+'+m.bounty, '#ffe08a');
  const p=posAt(Math.max(0,m.dist));
  const cols={mouse:'#d8dde7',usb:'#4f8bff',keyboard:'#cdd5e2',headset:'#ff8a5c',webcam:'#e8ebf2',monitor:'#3aa0ff',printer:'#a7adba'};
  burst(p.x,p.y,cols[m.type]||'#fff', m.boss?26:10);
}
function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=rnd(0,6.28), v=rnd(2,9);
    S.parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-3,t:rnd(0.4,0.8),color});
  }
}
function pop(m,txt,color){
  const p=posAt(Math.max(0,m.dist));
  S.pops.push({x:p.x,y:p.y,txt,color,t:1});
}
function explode(x,y,r,dmg,color){
  S.rings.push({x,y,r,t:0.35,color});
  burst(x,y,color,8);
  for(const m of S.monsters){
    if(m.hp<=0)continue;
    const p=posAt(Math.max(0,m.dist));
    if(hyp(p.x-x,p.y-y)<=r+MDEF[m.type].r) damage(m,dmg,false);
  }
}

function towerFire(t, dt){
  t.cd-=dt;
  if(t.flashT>0)t.flashT-=dt;
  if(t.rangeT>0)t.rangeT-=dt;
  if(t.buildT>0){t.buildT-=dt; return;}
  const d=TDEF[t.type];
  if(t.type==='fan'){
    t.spin+=dt*(6+S.speed);
    if(t.cd<=0){
      t.cd=1/d.rate;
      let hit=false;
      for(const m of S.monsters){
        if(m.hp<=0)continue;
        const p=posAt(Math.max(0,m.dist));
        if(hyp(p.x-t.x,p.y-t.y)<=t.range){
          m.slowT=d.slowT; m.slowF=d.slow; damage(m,t.dmg,false); hit=true;
        }
      }
      if(hit)S.rings.push({x:t.x,y:t.y,r:t.range,t:0.5,color:'rgba(77,216,230,0.5)',thin:true});
    }
    return;
  }
  if(t.cd>0)return;
  // 타겟: 가장 멀리 간 몬스터 (스나이퍼는 최대 체력)
  let tg=null,bv=-1;
  for(const m of S.monsters){
    if(m.hp<=0||m.dist<0)continue;
    const p=posAt(m.dist);
    if(hyp(p.x-t.x,p.y-t.y)>t.range)continue;
    const v=(t.type==='sniper')?m.hp:m.dist;
    if(v>bv){bv=v;tg=m;}
  }
  if(!tg)return;
  t.cd=1/d.rate;
  const tp=posAt(tg.dist);
  t.flashT=0.1; t.fx=tp.x; t.fy=tp.y;
  if(t.type==='laser'){
    S.beams.push({x1:t.x,y1:t.y-1.2,x2:tp.x,y2:tp.y,t:0.1,color:d.color,w:2});
    if(tg.hp>0){ damage(tg,t.dmg,true); if(tg.hp<=0)t.kills++; }
  } else if(t.type==='sniper'){
    const crit=Math.random()<d.crit;
    const dm=t.dmg*(crit?2:1);
    S.beams.push({x1:t.x,y1:t.y-1.4,x2:tp.x,y2:tp.y,t:0.14,color:crit?'#ffffff':d.color,w:crit?2.5:1.5});
    burst(tp.x,tp.y,d.color,4);
    if(crit)pop(tg,'크리티컬!','#5dff9a');
    damage(tg,dm,true); if(tg.hp<=0)t.kills++;
  } else if(t.type==='tesla'){
    const pts=[{x:t.x,y:t.y-1.2}];
    let cur=tg, last=tp, dmg=t.dmg;
    const hitSet=new Set();
    for(let c=0;c<d.chain;c++){
      if(!cur||cur.hp<=0){
        if(c===0){damage(cur,0,false);}
        break;
      }
      const cp=posAt(Math.max(0,cur.dist));
      pts.push({x:cp.x,y:cp.y});
      damage(cur,dmg,true); if(cur.hp<=0)t.kills++;
      hitSet.add(cur.id); dmg*=0.7; last=cp;
      let nx=null,nd=4.5;
      for(const m of S.monsters){
        if(m.hp<=0||hitSet.has(m.id)||m.dist<0)continue;
        const p=posAt(m.dist);
        const dd=hyp(p.x-last.x,p.y-last.y);
        if(dd<nd){nd=dd;nx=m;}
      }
      cur=nx;
    }
    S.bolts.push({pts,t:0.15});
  } else if(t.type==='cannon'){
    S.bullets.push({x:t.x,y:t.y-1.2,tx:tp.x,ty:tp.y,spd:34,dmg:t.dmg,splash:d.splash,color:d.color});
  } else if(t.type==='missile'){
    S.missiles.push({x:t.x,y:t.y-1.4,target:tg,lx:tp.x,ly:tp.y,spd:10,dmg:t.dmg,splash:d.splash,color:d.color,wob:rnd(0,6.28)});
  }
}

/* ---------- 업데이트 ---------- */
function update(dt){
  S.time+=dt;
  if(S.flash>0)S.flash-=dt;
  if(S.ai.msgT>0)S.ai.msgT-=dt;
  S.gold+=1.5*dt; // 소량 자동 수입

  // 웨이브 흐름
  if(S.phase==='rest'){
    S.restT-=dt;
    if(S.restT<=0) startWave();
  } else {
    if(S.spawnQ>0||S.bossQ>0){
      S.spawnT-=dt;
      if(S.spawnT<=0){
        S.spawnT=Math.max(0.45, 0.85-S.wave*0.015);
        if(S.bossQ>0 && S.spawnQ<=2){ spawn('printer'); S.bossQ--; }
        else if(S.spawnQ>0){ spawn(S.waveComp[Math.floor(Math.random()*S.waveComp.length)]); S.spawnQ--; }
      }
    } else if(S.monsters.length===0){
      const bonus=26+S.wave*5;
      S.gold+=bonus;
      toast(`✅ WAVE ${S.wave} 클리어! 보너스 +${bonus}G`);
      S.phase='rest'; S.restT=3.5;
    }
  }

  // 몬스터 이동
  for(let i=S.monsters.length-1;i>=0;i--){
    const m=S.monsters[i];
    if(m.hp<=0){S.monsters.splice(i,1);continue;}
    let f=1;
    if(m.slowT>0){m.slowT-=dt;f=m.slowF;}
    m.dist+=m.spd*f*dt;
    const d=MDEF[m.type];
    if(d.regen&&m.hp<m.max)m.hp=Math.min(m.max,m.hp+m.max*d.regen*dt);
    if(m.dist>=TOTAL){
      S.baseHP-=m.dmg; S.flash=0.4;
      burst(BASE.x,BASE.y,'#ff5566',12);
      S.monsters.splice(i,1);
      if(S.baseHP<=0){ doBSOD(); return; }
    }
  }

  // 포탑
  for(const t of S.towers) towerFire(t,dt);

  // AI
  S.ai.t-=dt;
  if(S.ai.t<=0){ S.ai.t=1.15; aiThink(); }

  // 캐논 탄
  for(let i=S.bullets.length-1;i>=0;i--){
    const b=S.bullets[i];
    const dx=b.tx-b.x, dy=b.ty-b.y, dd=hyp(dx,dy);
    const mv=b.spd*dt;
    if(dd<=mv){ explode(b.tx,b.ty,b.splash,b.dmg,b.color); S.bullets.splice(i,1); }
    else { b.x+=dx/dd*mv; b.y+=dy/dd*mv; }
  }
  // 미사일
  for(let i=S.missiles.length-1;i>=0;i--){
    const ms=S.missiles[i];
    ms.spd=Math.min(26,ms.spd+30*dt);
    let tx=ms.lx,ty=ms.ly;
    if(ms.target&&ms.target.hp>0){ const p=posAt(Math.max(0,ms.target.dist)); tx=p.x;ty=p.y; ms.lx=tx;ms.ly=ty; }
    ms.wob+=dt*9;
    const wx=Math.cos(ms.wob)*0.6;
    const dx=tx-ms.x+wx, dy=ty-ms.y, dd=hyp(dx,dy);
    const mv=ms.spd*dt;
    if(dd<=Math.max(mv,0.6)){ explode(tx,ty,ms.splash,ms.dmg,ms.color); S.missiles.splice(i,1); }
    else { ms.x+=dx/dd*mv; ms.y+=dy/dd*mv; }
  }
  // 이펙트 수명
  for(let i=S.beams.length-1;i>=0;i--){ if((S.beams[i].t-=dt)<=0)S.beams.splice(i,1); }
  for(let i=S.bolts.length-1;i>=0;i--){ if((S.bolts[i].t-=dt)<=0)S.bolts.splice(i,1); }
  for(let i=S.rings.length-1;i>=0;i--){ if((S.rings[i].t-=dt)<=0)S.rings.splice(i,1); }
  for(let i=S.parts.length-1;i>=0;i--){
    const p=S.parts[i]; p.t-=dt;
    if(p.t<=0){S.parts.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=18*dt;
  }
  for(let i=S.pops.length-1;i>=0;i--){
    const p=S.pops[i]; p.t-=dt; p.y-=1.6*dt;
    if(p.t<=0)S.pops.splice(i,1);
  }
}

/* ---------- BSOD & 재부팅 ---------- */
function doBSOD(){
  S.bsod=true;
  document.getElementById('bsod').classList.add('on');
  let pct=0;
  const iv=setInterval(()=>{
    pct+=Math.floor(rnd(8,20));
    if(pct>=100){
      pct=100; clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('bsod').classList.remove('on');
        reboot();
      },500);
    }
    const el=document.getElementById('bsodPct');
    if(el)el.textContent=`재부팅 준비 중... ${pct}%`;
  },320);
}
function reboot(){
  S.reboots++;
  S.gold=160; S.wave=0; S.kills=0; S.baseHP=S.baseMax;
  S.monsters=[]; S.towers=[]; S.bullets=[]; S.missiles=[];
  S.beams=[]; S.bolts=[]; S.rings=[]; S.parts=[]; S.pops=[];
  S.phase='rest'; S.restT=2.5; S.ai.plan=null; S.bsod=false;
  toast('🔌 재부팅 완료 — 방어 시스템 재가동');
}

/* ---------- 렌더 ---------- */
function drawSpr(spr,x,y,u,flip){
  const w=spr.w*u, h=spr.h*u;
  ctx.save();
  ctx.translate(x,y);
  if(flip)ctx.scale(-1,1);
  ctx.drawImage(spr.c,-w/2,-h/2,w,h);
  ctx.restore();
}
function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,CW,CW);
  if(bgC)ctx.drawImage(bgC,0,0,CW,CW);

  const c=cell;
  // 전류 입자 (경로 위 흐름)
  ctx.fillStyle='rgba(255,225,150,0.8)';
  for(let i=0;i<12;i++){
    const d=(S.time*9+i*TOTAL/12)%TOTAL;
    const p=posAt(d);
    const s=Math.max(1.5,c*0.4);
    ctx.globalAlpha=0.35+0.3*Math.sin(S.time*4+i);
    ctx.fillRect(p.x*c-s/2,p.y*c-s/2,s,s);
  }
  ctx.globalAlpha=1;

  // CPU 베이스
  {
    const bx=BASE.x*c, by=BASE.y*c;
    const glow=0.4+0.25*Math.sin(S.time*3);
    ctx.globalAlpha=glow;
    ctx.fillStyle=S.flash>0?'#ff5566':'#42ff8e';
    ctx.beginPath();ctx.arc(bx,by,c*4.5,0,7);ctx.fill();
    ctx.globalAlpha=1;
    drawSpr(SPR.cpu,bx,by,c*0.62,false);
    // HP 미니바
    const bw=c*9;
    ctx.fillStyle='#0a2318';ctx.fillRect(bx-bw/2,by+c*5,bw,Math.max(2,c*0.6));
    ctx.fillStyle=S.baseHP>10?'#42ff8e':'#ff5566';
    ctx.fillRect(bx-bw/2,by+c*5,bw*clamp(S.baseHP/S.baseMax,0,1),Math.max(2,c*0.6));
  }

  // 포탑
  for(const t of S.towers){
    const px=t.x*c, py=t.y*c;
    const d=TDEF[t.type];
    // 설치 직후 사거리 표시
    if(t.rangeT>0){
      ctx.globalAlpha=Math.min(0.25,t.rangeT*0.15);
      ctx.strokeStyle=d.color;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(px,py,t.range*c,0,7);ctx.stroke();
      ctx.globalAlpha=1;
    }
    let yo=0, u=c*0.44;
    if(t.buildT>0){ // 건설 애니메이션
      yo=t.buildT*c*4;
      ctx.globalAlpha=0.5;
      ctx.strokeStyle='#9be8c0';ctx.lineWidth=1;
      ctx.strokeRect(px-c*2.4,py-c*2.4,c*4.8,c*4.8);
      ctx.globalAlpha=1-t.buildT;
    }
    drawSpr(SPR[d.spr],px,py-c*1+yo*0,u,false);
    if(t.buildT>0)ctx.globalAlpha=1;
    // 쿨링팬 날개 회전
    if(t.type==='fan'){
      ctx.save();
      ctx.translate(px,py-c*2.05);
      ctx.rotate(t.spin);
      ctx.fillStyle='#bff2f8';
      const bl=c*1.5,bw2=Math.max(1.5,c*0.5);
      for(let k=0;k<3;k++){
        ctx.rotate(Math.PI*2/3);
        ctx.fillRect(0,-bw2/2,bl,bw2);
      }
      ctx.restore();
    }
    // 발사 플래시
    if(t.flashT>0&&t.fx!==undefined){
      ctx.globalAlpha=t.flashT*6;
      ctx.fillStyle=d.color;
      ctx.beginPath();ctx.arc(px,py-c*2,c*0.9,0,7);ctx.fill();
      ctx.globalAlpha=1;
    }
    // 레벨 핍
    if(t.lv>1){
      ctx.fillStyle='#ffd76a';
      for(let k=0;k<t.lv-1;k++)
        ctx.fillRect(px-c*1.2+k*c*1.1, py+c*1.6, Math.max(2,c*0.6), Math.max(2,c*0.6));
    }
  }

  // 몬스터
  for(const m of S.monsters){
    if(m.dist<0||m.hp<=0)continue;
    const p=posAt(m.dist);
    const d=MDEF[m.type];
    const px=p.x*c, py=p.y*c;
    const bob=Math.sin(S.time*7+m.id)*c*0.3;
    // 그림자
    ctx.globalAlpha=0.3;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(px,py+c*2.2,c*2,c*0.7,0,0,7);ctx.fill();
    ctx.globalAlpha=1;
    // 슬로우 표시
    if(m.slowT>0){
      ctx.globalAlpha=0.35;ctx.fillStyle='#4dd8e6';
      ctx.beginPath();ctx.arc(px,py,c*2.6,0,7);ctx.fill();
      ctx.globalAlpha=1;
    }
    drawSpr(SPR[d.spr],px,py+bob,c*d.u,p.dx<-0.1);
    // 체력바
    if(m.hp<m.max){
      const bw=c*(m.boss?7:4.4);
      const yb=py-c*(d.spr==='keyboard'?3.4:4.2)+bob;
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(px-bw/2,yb,bw,Math.max(2,c*0.55));
      ctx.fillStyle=m.boss?'#ff5566':'#42ff8e';
      ctx.fillRect(px-bw/2,yb,bw*clamp(m.hp/m.max,0,1),Math.max(2,c*0.55));
    }
  }

  // 탄/미사일
  for(const b of S.bullets){
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x*c,b.y*c,Math.max(2,c*0.55),0,7);ctx.fill();
  }
  for(const ms of S.missiles){
    ctx.fillStyle=ms.color;
    ctx.fillRect(ms.x*c-c*0.4,ms.y*c-c*0.7,Math.max(2,c*0.8),Math.max(3,c*1.4));
    ctx.globalAlpha=0.5;ctx.fillStyle='#ffb84d';
    ctx.fillRect(ms.x*c-c*0.25,ms.y*c+c*0.8,Math.max(1,c*0.5),Math.max(2,c*0.8));
    ctx.globalAlpha=1;
  }
  // 빔
  for(const b of S.beams){
    ctx.globalAlpha=clamp(b.t*8,0,1);
    ctx.strokeStyle=b.color;ctx.lineWidth=b.w;
    ctx.beginPath();ctx.moveTo(b.x1*c,b.y1*c);ctx.lineTo(b.x2*c,b.y2*c);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // 테슬라 번개
  for(const bo of S.bolts){
    ctx.globalAlpha=clamp(bo.t*7,0,1);
    ctx.strokeStyle='#d9b3ff';ctx.lineWidth=1.6;
    ctx.beginPath();
    for(let i=0;i<bo.pts.length-1;i++){
      const a=bo.pts[i],b2=bo.pts[i+1];
      ctx.moveTo(a.x*c,a.y*c);
      const mx=(a.x+b2.x)/2+rnd(-1,1), my=(a.y+b2.y)/2+rnd(-1,1);
      ctx.lineTo(mx*c,my*c);ctx.lineTo(b2.x*c,b2.y*c);
    }
    ctx.stroke();ctx.globalAlpha=1;
  }
  // 링
  for(const r of S.rings){
    const pr=r.thin? r.r : r.r*(1-r.t/0.35+0.3);
    ctx.globalAlpha=clamp(r.t*2.2,0,0.8);
    ctx.strokeStyle=r.color;ctx.lineWidth=r.thin?1.2:2.5;
    ctx.beginPath();ctx.arc(r.x*c,r.y*c,pr*c,0,7);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // 파편
  for(const p of S.parts){
    ctx.globalAlpha=clamp(p.t*2,0,1);
    ctx.fillStyle=p.color;
    const s=Math.max(1.5,c*0.5);
    ctx.fillRect(p.x*c-s/2,p.y*c-s/2,s,s);
  }
  ctx.globalAlpha=1;
  // 골드 팝업
  ctx.font=`bold ${Math.max(9,c*2.2)}px monospace`;
  ctx.textAlign='center';
  for(const p of S.pops){
    ctx.globalAlpha=clamp(p.t*1.5,0,1);
    ctx.fillStyle=p.color;
    ctx.fillText(p.txt,p.x*c,p.y*c-c*3);
  }
  ctx.globalAlpha=1;

  // 웨이브 휴식 카운트
  if(S.phase==='rest'&&!S.bsod){
    ctx.fillStyle='rgba(255,215,106,0.85)';
    ctx.font=`bold ${Math.max(12,c*3)}px monospace`;
    ctx.fillText(`NEXT WAVE ${S.wave+1} — ${Math.max(0,S.restT).toFixed(1)}s`,CW/2,CW*0.5);
  }
  if(S.paused){
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,CW,CW);
    ctx.fillStyle='#7dffb0';
    ctx.font=`bold ${Math.max(14,c*4)}px monospace`;
    ctx.fillText('⏸ PAUSED',CW/2,CW/2);
  }
}

/* ---------- HUD / 토스트 ---------- */
let toastT=0;
function toast(msg){
  const el=document.getElementById('ailine');
  if(el)el.textContent=msg;
  toastT=0;
}
let hudT=0;
function updHUD(dt){
  hudT-=dt;
  if(hudT>0)return;
  hudT=0.15;
  const g=id=>document.getElementById(id);
  const w=g('waveEl'),go=g('goldEl'),k=g('killEl'),hf=g('hpfill'),st=g('stats');
  if(w)w.textContent='WAVE '+Math.max(1,S.wave);
  if(go)go.textContent='⛁ '+Math.floor(S.gold);
  if(k)k.textContent='✕ '+S.kills;
  if(hf)hf.style.width=(clamp(S.baseHP/S.baseMax,0,1)*100)+'%';
  if(st)st.textContent=`포탑 ${S.towers.length} · 재부팅 ${S.reboots}회 · 최고 WAVE ${S.bestWave}`;
}

/* ---------- 루프 ---------- */
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!last)last=ts;
  let dt=Math.min(0.05,(ts-last)/1000);
  last=ts;
  if(!S.paused&&!S.bsod){
    let sdt=dt*S.speed;
    while(sdt>0.0001){
      const st=Math.min(sdt,0.033);
      update(st);
      sdt-=st;
      if(S.bsod)break;
    }
  }
  render();
  updHUD(dt);
}

/* ---------- 컨트롤 ---------- */
function bind(id,fn){
  const el=document.getElementById(id);
  if(el&&el.addEventListener)el.addEventListener('click',fn);
}
bind('pauseBtn',()=>{
  S.paused=!S.paused;
  const b=document.getElementById('pauseBtn');
  if(b)b.textContent=S.paused?'▶ 재생':'⏸ 일시정지';
});
bind('speedBtn',()=>{
  S.speed=S.speed===1?2:(S.speed===2?4:1);
  const b=document.getElementById('speedBtn');
  if(b)b.textContent='▶ '+S.speed+'x';
});
bind('rebootBtn',()=>{ if(!S.bsod)reboot(); });

let userPaused=false;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ userPaused=S.paused; S.paused=true; }
  else if(!userPaused){ S.paused=false; const b=document.getElementById('pauseBtn'); if(b)b.textContent='⏸ 일시정지'; }
});
window.addEventListener('resize',resize);

// 디버그 핸들 (헤드리스 테스트용)
window.__dbg = { S, TOTAL, candidates, startWave, update };

resize();
toast('🤖 방어 AI 온라인 — 첫 웨이브 대비 중');
requestAnimationFrame(loop);
</script>
